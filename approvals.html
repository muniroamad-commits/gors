<!DOCTYPE html>
<html lang="pt-MZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Aprovações — M&amp;E MozCommunity</title>
<link rel="icon" href="img/logo-adin.jpg" type="image/jpeg">
<link rel="stylesheet" href="css/style.css">
<style>
  table.cases { width: 100%; border-collapse: collapse; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
  table.cases th { text-align: left; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-muted); padding: 12px 14px; border-bottom: 1px solid var(--line); font-family: var(--font-mono); font-weight: 500;}
  table.cases td { padding: 13px 14px; border-bottom: 1px solid var(--line); font-size: 0.86rem; vertical-align: middle; }
  table.cases tr:last-child td { border-bottom: none; }
  .denied { max-width: 520px; margin: 60px auto; text-align: center; }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">
      <span class="brand-mark"><img src="img/logo-adin.jpg" alt="Logótipo ADIN"></span>
      <span class="brand-name">M&amp;E MozCommunity<small data-i18n="brand_tagline">Monitoria de Indicadores — ADIN</small></span>
    </a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menu" aria-expanded="false">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <nav class="main-nav">
      <a href="dashboard.html" data-i18n="nav_indicators">Indicadores</a>
      <a href="relatorios.html" data-i18n="nav_reports">Relatórios</a>
      <a href="approvals.html" class="is-active" data-i18n="nav_approvals">Aprovações</a>
      <a href="users.html" id="users-link" style="display:none;" data-i18n="nav_users">Utilizadores</a>
      <span class="small-note" id="admin-name-label" style="margin-right:8px;"></span>
            <a href="approvals.html" id="notif-bell" title="Aprovações pendentes" style="display:none; position:relative; text-decoration:none; color:var(--ink); margin-right:6px; font-size:1.1rem;">
        🔔<span id="notif-badge" style="display:none; position:absolute; top:-6px; right:-10px; background:var(--brick); color:#fff; font-size:0.62rem; font-weight:700; padding:1px 5px; border-radius:999px; line-height:1.3;">0</span>
      </a>
      <a href="#" id="logout-link" data-i18n="nav_logout">Sair</a>
    </nav>
  </div>
</header>

<div id="denied-area" class="container" style="display:none;">
  <div class="denied">
    <h2 data-i18n="access_denied">Acesso restrito</h2>
    <p data-i18n="admin_only_approvals">Só o Administrador geral pode aceder às aprovações.</p>
    <a href="dashboard.html" class="btn btn-secondary" data-i18n="back_to_indicators">Voltar aos indicadores</a>
  </div>
</div>

<main id="main-area" style="display:none;">
  <section>
    <div class="container">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:12px; flex-wrap:wrap;">
        <div>
          <span class="eyebrow" data-i18n="approvals_eyebrow">Fila de aprovação</span>
          <h1 style="font-size:clamp(1.6rem,3vw,2.1rem)" data-i18n="approvals_title">Valores por aprovar</h1>
        </div>
      </div>

      <table class="cases">
        <thead><tr><th data-i18n="col_indicator">Indicador</th><th data-i18n="period">Período</th><th data-i18n="value_label">Valor</th><th data-i18n="submitted_by">Submetido por</th><th data-i18n="date">Data</th><th></th></tr></thead>
        <tbody id="pending-tbody">
          <tr><td colspan="6" class="skeleton" style="height:40px;"></td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<div id="detail-overlay" style="display:none; position:fixed; inset:0; background:rgba(24,36,48,0.5); z-index:90;"></div>
<div id="detail-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:91; width:min(640px, 92vw); max-height:88vh; overflow-y:auto; background:var(--paper); border-radius:14px; box-shadow:var(--shadow-raised); padding:28px;">
  <div id="detail-content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/store.js"></script>
<script src="js/i18n.js"></script>
<script>
I18N.applyStaticTranslations();
I18N.injectToggle('.main-nav');

ME.onAuthChange(admin => {
  if (!admin) { window.location.href = 'index.html'; return; }
  if (admin.noProfile) {
    alert('A tua conta não tem permissões configuradas nesta plataforma.');
    ME.adminLogout().then(() => window.location.href = 'index.html');
    return;
  }
  if (admin.role !== 'admin') {
    document.getElementById('denied-area').style.display = 'block';
    document.getElementById('admin-name-label').textContent = admin.name;
    return;
  }
  document.getElementById('main-area').style.display = 'block';
  document.getElementById('admin-name-label').textContent = admin.name;
  document.getElementById('users-link').style.display = '';
  loadPending();
});

document.getElementById('logout-link').addEventListener('click', (e) => {
  e.preventDefault();
  ME.adminLogout().then(() => window.location.href = 'index.html');
});

let pendingCache = [];

async function loadPending() {
  const tbody = document.getElementById('pending-tbody');
  tbody.innerHTML = `<tr><td colspan="6" class="skeleton" style="height:40px;"></td></tr>`;
  try {
    const rows = await ME.listValues({ status: 'submetido' });
    pendingCache = rows;
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="small-note" style="padding:24px;">${I18N.t('no_pending')}</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(v => `
      <tr style="cursor:pointer;" onclick="openDetail('${v.id}')">
        <td>${escapeHtml(v.indicator_name)}</td>
        <td>${escapeHtml(v.period)}</td>
        <td>${escapeHtml(String(v.value))}${v.disagg ? ' <span class="small-note">(' + Object.entries(v.disagg).map(([k,val]) => `${k}: ${val}`).join(', ') + ')</span>' : ''}</td>
        <td class="small-note">${escapeHtml(v.submitted_by)}</td>
        <td class="small-note">${formatDate(v.submitted_at)}</td>
        <td style="text-align:right; white-space:nowrap;" onclick="event.stopPropagation()">
          <button class="btn btn-secondary btn-sm" onclick="openDetail('${v.id}')">${I18N.t('view_details')}</button>
          <button class="btn btn-primary btn-sm" onclick="review('${v.id}', true)">${I18N.t('approve')}</button>
          <button class="btn btn-secondary btn-sm" onclick="review('${v.id}', false)">${I18N.t('reject')}</button>
        </td>
      </tr>
    `).join('');
  } catch (err) {
    console.error(err);
    tbody.innerHTML = `<tr><td colspan="6"><div class="alert alert-error">${I18N.getLang() === 'en' ? 'Could not load the queue.' : 'Não foi possível carregar a fila.'}</div></td></tr>`;
  }
}

function openDetail(id) {
  const v = pendingCache.find(x => x.id === id);
  if (!v) return;
  const en = I18N.getLang() === 'en';

  const evidenceHtml = (v.evidence || []).length
    ? v.evidence.map(e => `<div class="attach-item" style="display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border:1px solid var(--line); border-radius:7px; margin-bottom:8px; font-size:0.85rem;">
        <span>${escapeHtml(e.name)}</span>
        <a href="${e.dataUrl}" download="${escapeHtml(e.name)}" class="btn btn-secondary btn-sm">${en ? 'View / download' : 'Ver / descarregar'}</a>
      </div>`).join('')
    : `<p class="small-note">${I18N.t('no_evidence')}</p>`;

  document.getElementById('detail-content').innerHTML = `
    <button onclick="closeDetail()" style="position:absolute; top:20px; right:24px; background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--ink-muted);">&times;</button>
    <h2 style="font-size:1.2rem; margin:0 0 4px;">${escapeHtml(v.indicator_name)}</h2>
    <p class="small-note" style="margin:0 0 16px;">${escapeHtml(v.component || '')}</p>

    <dl class="kv">
      <dt>${I18N.t('period')}</dt><dd>${escapeHtml(v.period)}</dd>
      <dt>${I18N.t('value_label')}</dt><dd>${escapeHtml(String(v.value))}</dd>
      ${v.disagg ? `<dt>${I18N.t('disaggregation_label')}</dt><dd>${Object.entries(v.disagg).map(([k,val]) => `${k}: ${val}`).join(', ')}</dd>` : ''}
      ${v.status_disagg ? `<dt>${I18N.t('status_label')}</dt><dd>${Object.entries(v.status_disagg).map(([k,val]) => `${k}: ${val}`).join(', ')}</dd>` : ''}
      <dt>${I18N.t('location_label')}</dt><dd>${[v.province, v.district].filter(Boolean).join(', ') || '—'}</dd>
      <dt>${I18N.t('submitted_by')}</dt><dd>${escapeHtml(v.submitted_by)}</dd>
      <dt>${I18N.t('date')}</dt><dd>${formatDate(v.submitted_at)}</dd>
    </dl>

    <h4 style="font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-muted); margin:18px 0 6px;">${I18N.t('process_summary')}</h4>
    <p>${escapeHtml(v.note || '—')}</p>

    <h4 style="font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-muted); margin:18px 0 6px;">${I18N.t('evidence_label')}</h4>
    ${evidenceHtml}

    <div style="display:flex; gap:10px; margin-top:24px;">
      <button class="btn btn-primary" onclick="review('${v.id}', true); closeDetail();">${I18N.t('approve')}</button>
      <button class="btn btn-secondary" onclick="review('${v.id}', false); closeDetail();">${I18N.t('reject')}</button>
      <a href="indicador.html?id=${encodeURIComponent(v.indicator_id)}" class="btn btn-secondary" style="margin-left:auto;">${I18N.t('view_full_indicator')}</a>
    </div>
  `;
  document.getElementById('detail-overlay').style.display = 'block';
  document.getElementById('detail-modal').style.display = 'block';
}

function closeDetail() {
  document.getElementById('detail-overlay').style.display = 'none';
  document.getElementById('detail-modal').style.display = 'none';
}
document.getElementById('detail-overlay').addEventListener('click', closeDetail);

async function review(id, approve) {
  const en = I18N.getLang() === 'en';
  const note = approve ? null : (prompt(en ? 'Reason for rejection (optional):' : 'Motivo da rejeição (opcional):') || null);
  try {
    await ME.reviewValue(id, { approve, review_note: note });
    loadPending();
  } catch (err) {
    console.error(err);
    alert(err.message || (en ? 'Could not update.' : 'Não foi possível actualizar.'));
  }
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('pt-MZ', { day: '2-digit', month: 'short', year: 'numeric' });
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

document.getElementById('nav-toggle')?.addEventListener('click', () => {
  const nav = document.querySelector('.main-nav');
  const open = nav.classList.toggle('is-open');
  document.getElementById('nav-toggle').setAttribute('aria-expanded', String(open));
});
</script>
<script>
// Sino de notificações — só para o Administrador geral, actualizado em
// tempo real sempre que houver valores à espera de aprovação.
ME.onAuthChange(admin => {
  if (!admin || admin.role !== 'admin') return;
  const bell = document.getElementById('notif-bell');
  if (!bell) return;
  bell.style.display = '';
  ME.subscribePendingCount(count => {
    const badge = document.getElementById('notif-badge');
    if (count > 0) {
      badge.textContent = count > 99 ? '99+' : String(count);
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  });
});
</script>
</body>
</html>
