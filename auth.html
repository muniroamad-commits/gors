<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aceder — MozCommunity</title>
<meta name="description" content="Aceda à plataforma de monitoria de indicadores do projeto do Norte de Moçambique.">
<link rel="icon" href="img/adin-logo.png" type="image/png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="center-page">
  <div class="auth-box">
    <div class="auth-logo">
      <span class="brand-mark"><img src="img/adin-logo.png" alt="ADIN"></span>
      <h1 class="text-lg font-semibold">MozCommunity</h1>
      <p class="text-sm muted">Monitoria de indicadores do projecto</p>
    </div>

    <div class="card">
      <div class="card-header">
        <p class="card-title">Aceder à plataforma</p>
        <p class="text-sm muted mt-1">Inicie sessão ou crie a sua conta institucional.</p>
      </div>
      <div class="card-content">
        <div class="tabs">
          <button type="button" class="active" data-tab="signin">Entrar</button>
          <button type="button" data-tab="signup">Registar</button>
        </div>

        <form id="signin-form" class="mt-2">
          <div class="field">
            <label for="si-email">Email</label>
            <input class="input" id="si-email" type="email" required>
          </div>
          <div class="field">
            <div class="flex-between">
              <label for="si-pass" style="margin:0;">Palavra-passe</label>
              <button type="button" id="forgot-btn" class="text-xs muted" style="background:none;border:none;cursor:pointer;text-decoration:underline;">Esqueceu a palavra-passe?</button>
            </div>
            <input class="input" id="si-pass" type="password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="signin-btn">Entrar</button>
        </form>

        <form id="signup-form" class="mt-2 hidden">
          <div class="field">
            <label for="su-name">Nome completo</label>
            <input class="input" id="su-name" type="text">
          </div>
          <div class="field">
            <label for="su-org">Organização</label>
            <input class="input" id="su-org" type="text" placeholder="ADIN, PPT, DIT…">
          </div>
          <div class="field">
            <label for="su-email">Email</label>
            <input class="input" id="su-email" type="email" required>
          </div>
          <div class="field">
            <label for="su-pass">Palavra-passe</label>
            <input class="input" id="su-pass" type="password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="signup-btn">Criar conta</button>
        </form>

        <div class="flex-between mt-4" style="gap:0.5rem;">
          <span style="flex:1;border-top:1px solid var(--border);"></span>
          <span class="text-xs muted">ou</span>
          <span style="flex:1;border-top:1px solid var(--border);"></span>
        </div>
        <button type="button" class="btn btn-outline btn-block mt-2" id="google-btn">Continuar com Google</button>
      </div>
    </div>

    <p class="text-sm mt-4" style="text-align:center;">
      <a href="index.html" class="muted">← Voltar à página inicial</a>
    </p>
  </div>
</div>

<div id="toast-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/lib.js"></script>
<script src="js/ui.js"></script>
<script src="js/data.js"></script>
<script>
(async function () {
  const sb = window.GORS.sb;

  // If arriving from a password-recovery link, hand off to reset-password.
  if (window.location.hash.includes("type=recovery")) {
    window.location.replace("reset-password.html");
    return;
  }

  // Already signed in? Skip straight to the dashboard.
  const session = await window.GORS.getSession();
  if (session) {
    const user = await window.GORS.getUser();
    if (user) window.location.replace("dashboard.html");
  }

  document.querySelectorAll(".tabs button").forEach((btn) => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tabs button").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("signin-form").classList.toggle("hidden", btn.dataset.tab !== "signin");
      document.getElementById("signup-form").classList.toggle("hidden", btn.dataset.tab !== "signup");
    });
  });

  document.getElementById("signin-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("signin-btn");
    window.GORS.setBusy(btn, true, "A entrar…");
    try {
      const email = document.getElementById("si-email").value;
      const password = document.getElementById("si-pass").value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        const msg = error.message.toLowerCase();
        if (msg.includes("invalid login")) {
          window.GORS.toast(
            "Credenciais inválidas. Se criou conta com Google, use 'Continuar com Google'. Caso contrário, verifique o email/palavra-passe ou use 'Esqueceu a palavra-passe?'.",
            "error",
          );
        } else if (msg.includes("email not confirmed") || msg.includes("not confirmed")) {
          window.GORS.toast("Email ainda não confirmado. Verifique a sua caixa de entrada.", "error");
        } else {
          window.GORS.toastError(error);
        }
        return;
      }
      window.GORS.toast("Sessão iniciada.", "success");
      window.location.href = "dashboard.html";
    } catch (err) {
      window.GORS.toastError(err);
    } finally {
      window.GORS.setBusy(btn, false);
    }
  });

  document.getElementById("signup-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("signup-btn");
    window.GORS.setBusy(btn, true, "A criar conta…");
    try {
      const email = document.getElementById("su-email").value;
      const password = document.getElementById("su-pass").value;
      const fullName = document.getElementById("su-name").value;
      const organization = document.getElementById("su-org").value;
      const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: `${window.location.origin}${window.location.pathname.replace(/[^/]*$/, "")}auth.html`,
          data: { full_name: fullName, organization },
        },
      });
      if (error) {
        window.GORS.toastError(error);
        return;
      }
      if (data.session) {
        window.GORS.toast("Conta criada. Sessão iniciada.", "success");
        window.location.href = "dashboard.html";
        return;
      }
      document.getElementById("su-pass").value = "";
      window.GORS.toast("Conta criada. Confirme o email antes de aceder.", "success");
    } catch (err) {
      window.GORS.toastError(err);
    } finally {
      window.GORS.setBusy(btn, false);
    }
  });

  document.getElementById("forgot-btn").addEventListener("click", async () => {
    const email = document.getElementById("si-email").value;
    if (!email) {
      window.GORS.toast("Insira o seu email primeiro.", "error");
      return;
    }
    try {
      const redirectTo = `${window.location.origin}${window.location.pathname.replace(/[^/]*$/, "")}reset-password.html`;
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
      if (error) {
        window.GORS.toastError(error);
        return;
      }
      window.GORS.toast("Enviámos um link de recuperação para o seu email.", "success");
    } catch (err) {
      window.GORS.toastError(err);
    }
  });

  document.getElementById("google-btn").addEventListener("click", async () => {
    const btn = document.getElementById("google-btn");
    window.GORS.setBusy(btn, true, "A abrir o Google…");
    try {
      const redirectTo = `${window.location.origin}${window.location.pathname.replace(/[^/]*$/, "")}dashboard.html`;
      const { error } = await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo } });
      if (error) {
        window.GORS.toast("Falha ao entrar com Google.", "error");
        window.GORS.setBusy(btn, false);
      }
      // On success the browser is redirected away — nothing else to do here.
    } catch (err) {
      window.GORS.toastError(err);
      window.GORS.setBusy(btn, false);
    }
  });
})();
</script>
</body>
</html>
