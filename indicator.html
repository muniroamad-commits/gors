<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Indicador — GORS</title>
<link rel="icon" href="img/adin-logo.png" type="image/png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <div class="app-main">
    <header class="app-topbar" id="app-topbar"></header>
    <main class="app-content">
      <div id="di-loading" class="loading-block"><span class="spinner"></span> A carregar…</div>
      <div id="di-content" class="stack hidden"></div>
    </main>
  </div>
</div>

<!-- Registar valor -->
<div class="overlay hidden" id="dlg-record-value">
  <div class="dialog">
    <h3>Registar valor real</h3>
    <p class="dialog-desc" id="rv-indicator-name"></p>

    <div class="hint" style="border:1px solid var(--border);border-radius:var(--radius);padding:0.5rem 0.75rem;background:var(--muted);margin-bottom:1rem;" id="rv-frequency-hint"></div>

    <div class="grid grid-2">
      <div class="field"><label>Ano</label><select class="input" id="rv-year"></select></div>
      <div class="field" id="rv-sub-field"><label id="rv-sub-label">Sub-período</label><select class="input" id="rv-sub"></select></div>
    </div>
    <p class="text-xs muted" id="rv-period-info" style="margin-bottom:1rem;"></p>

    <div class="grid grid-2">
      <div class="field"><label>Província</label><select class="input" id="rv-province"></select></div>
      <div class="field"><label>Distrito</label><select class="input" id="rv-district"></select></div>
    </div>
    <div class="grid grid-2">
      <div class="field"><label>Género / faixa etária</label><select class="input" id="rv-demographic"></select></div>
      <div class="field"><label>Estatuto</label><select class="input" id="rv-status"></select></div>
    </div>

    <div class="field" id="rv-text-field"><label>Valor (texto)</label><textarea class="input" id="rv-text" rows="3"></textarea></div>
    <div class="field" id="rv-yesno-field"><label>Valor</label>
      <select class="input" id="rv-yesno"><option value="">Sim / Não</option><option value="1">Sim</option><option value="0">Não</option></select>
    </div>
    <div class="field" id="rv-number-field"><label id="rv-number-label">Valor real</label><input class="input" type="number" id="rv-number" placeholder="0"></div>

    <div class="field"><label>Observação (opcional)</label><textarea class="input" id="rv-note" rows="2"></textarea></div>

    <div style="border:1px solid var(--border);border-radius:var(--radius);padding:0.75rem;margin-bottom:1rem;">
      <div class="flex-between">
        <label style="margin:0;">📄 Evidência do indicador (PDF)</label>
        <span class="text-xs muted" id="rv-evidence-date"></span>
      </div>
      <input type="file" id="rv-evidence-file" accept="application/pdf" class="hidden">
      <div class="flex gap-2 flex-wrap mt-2">
        <button class="btn btn-outline btn-sm" type="button" id="rv-evidence-upload-btn">Carregar PDF</button>
        <button class="btn btn-ghost btn-sm hidden" type="button" id="rv-evidence-view-btn">Ver actual</button>
        <button class="btn btn-ghost btn-sm hidden" type="button" id="rv-evidence-remove-btn" style="color:var(--destructive);">Remover</button>
      </div>
      <p class="text-xs muted mt-1" id="rv-evidence-name"></p>
    </div>

    <div class="dialog-footer" style="justify-content:space-between;">
      <button class="btn btn-ghost" type="button" id="rv-remove-btn" style="color:var(--destructive);">Remover</button>
      <div class="flex gap-2">
        <button class="btn btn-outline" type="button" id="rv-cancel-btn">Cancelar</button>
        <button class="btn btn-primary" type="button" id="rv-save-btn">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Editar indicador -->
<div class="overlay hidden" id="dlg-indicator-form">
  <div class="dialog">
    <h3>Editar indicador</h3>
    <p class="dialog-desc">Preencha os dados do indicador do quadro de resultados.</p>
    <div class="field"><label>Nome</label><textarea class="input" id="ifd-name" rows="2"></textarea></div>
    <div class="grid grid-2">
      <div class="field"><label>Nível</label>
        <select class="input" id="ifd-level">
          <option value="pdo_program">PDO — Programa</option>
          <option value="pdo_phase1">PDO — Fase I</option>
          <option value="intermediate">Intermediário</option>
        </select>
      </div>
      <div class="field"><label>Tipo de valor</label>
        <select class="input" id="ifd-value-type">
          <option value="number">Número</option>
          <option value="percentage">Percentagem</option>
          <option value="yes_no">Sim / Não</option>
          <option value="text">Texto</option>
        </select>
      </div>
    </div>
    <div class="grid grid-2">
      <div class="field"><label>Componente</label><select class="input" id="ifd-component"><option value="">Sem componente</option></select></div>
      <div class="field"><label>Unidade</label><input class="input" id="ifd-unit"></div>
    </div>
    <div class="grid grid-2" id="ifd-numeric-row">
      <div class="field"><label>Baseline</label><input class="input" type="number" id="ifd-baseline"></div>
      <div class="field"><label>Meta final</label><input class="input" type="number" id="ifd-target"></div>
    </div>
    <div class="grid grid-2">
      <div class="field"><label>Frequência</label><input class="input" id="ifd-frequency"></div>
      <div class="field"><label>Responsável</label><input class="input" id="ifd-responsibility"></div>
    </div>
    <div class="field"><label>Fonte de dados</label><input class="input" id="ifd-data-source"></div>
    <div class="field"><label>Metodologia</label><textarea class="input" id="ifd-methodology" rows="2"></textarea></div>
    <div class="field"><label>Descrição</label><textarea class="input" id="ifd-description" rows="2"></textarea></div>
    <div class="dialog-footer">
      <button class="btn btn-outline" id="ifd-cancel" type="button">Cancelar</button>
      <button class="btn btn-primary" id="ifd-save" type="button">Guardar</button>
    </div>
  </div>
</div>

<!-- Eliminar indicador -->
<div class="overlay hidden" id="dlg-delete-indicator">
  <div class="dialog">
    <h3>Eliminar indicador?</h3>
    <p class="dialog-desc" id="del-ind-desc"></p>
    <div class="dialog-footer">
      <button class="btn btn-outline" type="button" id="del-ind-cancel">Cancelar</button>
      <button class="btn btn-destructive" type="button" id="del-ind-confirm">Eliminar</button>
    </div>
  </div>
</div>

<div id="toast-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/lib.js"></script>
<script src="js/ui.js"></script>
<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script>
(async function () {
  const G = window.GORS;
  const user = await G.requireAuth();
  if (!user) return;

  let fw;
  try {
    fw = await G.getFramework();
  } catch (err) {
    document.getElementById("di-loading").innerHTML = `<p class="muted">${G.escapeHtml(err.message)}</p>`;
    return;
  }
  G.renderShell(fw, "indicators");

  const id = G.qs("id");
  let ind = fw.indicators.find((i) => i.id === id);
  if (!ind) {
    document.getElementById("di-loading").innerHTML = `<p class="muted">Indicador não encontrado.</p>`;
    return;
  }

  // ---------------------------------------------------------------
  // Period-values table (flat or pivoted by year), ported 1:1 from
  // the original React PeriodValuesTable component.
  // ---------------------------------------------------------------
  function buildActualMap(indicator) {
    const map = new Map();
    const targetKeys = new Set(indicator.targets.map((t) => t.period_label));
    const bucketFor = (label) => {
      if (targetKeys.has(label)) return label;
      const year = label.split("-")[0];
      return targetKeys.has(year) ? year : label;
    };
    for (const a of indicator.actuals) {
      const key = bucketFor(a.period_label);
      const prev = map.get(key);
      const nextValue = a.actual_value === null ? (prev ? prev.value : null) : (prev ? prev.value || 0 : 0) + a.actual_value;
      const nextText = a.actual_text ?? (prev ? prev.text : null);
      const nextNote = a.note ?? (prev ? prev.note : null);
      map.set(key, { value: nextValue, text: nextText, note: nextNote });
    }
    return map;
  }

  function parsePeriodLabel(label, kind) {
    if (kind === "monthly") {
      const m = /^(\d{4})-(\d{2})$/.exec(label);
      return m ? { year: Number(m[1]), sub: Number(m[2]) } : null;
    }
    if (kind === "quarterly") {
      const m = /^(\d{4})-T([1-4])$/.exec(label);
      return m ? { year: Number(m[1]), sub: Number(m[2]) } : null;
    }
    if (kind === "semestral") {
      const m = /^(\d{4})-S([12])$/.exec(label);
      return m ? { year: Number(m[1]), sub: Number(m[2]) } : null;
    }
    return null;
  }

  function buildYearRows(indicator, actualMap, kind) {
    const yearMap = new Map();
    const ensure = (year) => {
      let row = yearMap.get(year);
      if (!row) { row = { year, cells: new Map() }; yearMap.set(year, row); }
      return row;
    };
    for (const t of indicator.targets) {
      const parsed = parsePeriodLabel(t.period_label, kind);
      if (!parsed) continue;
      const row = ensure(parsed.year);
      const cell = row.cells.get(parsed.sub) || { target: null, actual: null, note: null };
      cell.target = t.target_value;
      row.cells.set(parsed.sub, cell);
    }
    for (const [label, a] of actualMap.entries()) {
      const parsed = parsePeriodLabel(label, kind);
      if (!parsed) continue;
      const row = ensure(parsed.year);
      const cell = row.cells.get(parsed.sub) || { target: null, actual: null, note: null };
      cell.actual = a.value;
      cell.note = a.note;
      row.cells.set(parsed.sub, cell);
    }
    return [...yearMap.values()]
      .filter((row) => { for (const c of row.cells.values()) if (c.actual !== null) return true; return false; })
      .sort((a, b) => a.year - b.year);
  }

  function flatPeriodValuesTable(indicator, actualMap) {
    const isTxt = indicator.value_type === "text";
    return `<table class="data-table"><thead><tr>
        <th>Período</th><th class="num">Meta</th><th class="num">Real</th><th>Observação</th>
      </tr></thead><tbody>
      ${indicator.targets
        .map((t) => {
          const a = actualMap.get(t.period_label);
          const meta = isTxt
            ? t.target_text ?? "—"
            : indicator.value_type === "yes_no"
              ? t.target_text ?? G.formatValue(t.target_value, indicator.value_type)
              : G.formatValue(t.target_value, indicator.value_type);
          const real = a ? (isTxt ? a.text ?? "—" : G.formatValue(a.value, indicator.value_type)) : "—";
          return `<tr><td class="font-medium">${G.escapeHtml(t.period_label)}</td><td class="num">${G.escapeHtml(meta)}</td><td class="num">${G.escapeHtml(real)}</td><td class="muted">${G.escapeHtml((a && a.note) || "")}</td></tr>`;
        })
        .join("")}
    </tbody></table>`;
  }

  function pivotedPeriodValuesTable(indicator, actualMap, kind) {
    const subs = G.subOptions(kind);
    const subLabelFor = (n) => (kind === "monthly" ? G.MONTHS_PT[n - 1].slice(0, 3) : (subs.find((s) => s.value === n) || {}).label || String(n));
    const years = buildYearRows(indicator, actualMap, kind);
    const fmt = (v) => (v === null || v === undefined ? "—" : G.formatValue(v, indicator.value_type));
    return `<div style="overflow-x:auto;"><table class="data-table"><thead><tr>
        <th>Ano</th>${subs.map((s) => `<th class="num">${G.escapeHtml(subLabelFor(s.value))}</th>`).join("")}<th class="num">Real</th><th>Observação</th>
      </tr></thead><tbody>
      ${years
        .map((row) => {
          const actuals = [];
          const notes = [];
          for (const c of row.cells.values()) {
            if (c.actual !== null) actuals.push(c.actual);
            if (c.note) notes.push(c.note);
          }
          const realTotal =
            indicator.value_type === "number"
              ? actuals.length === 0 ? null : actuals.reduce((s, v) => s + v, 0)
              : actuals.length === 0 ? null : actuals[actuals.length - 1];
          const cells = subs
            .map((s) => {
              const c = row.cells.get(s.value);
              return `<td class="num">${c && c.actual !== null ? G.escapeHtml(fmt(c.actual)) : "—"}</td>`;
            })
            .join("");
          return `<tr><td class="font-medium">${row.year}</td>${cells}<td class="num font-semibold">${G.escapeHtml(fmt(realTotal))}</td><td class="muted">${G.escapeHtml(notes.join("; "))}</td></tr>`;
        })
        .join("")}
    </tbody></table></div>`;
  }

  function periodValuesTable(indicator) {
    const actualMap = buildActualMap(indicator);
    let kind = G.periodKindFromFrequency(indicator.frequency);
    if (indicator.targets[0] && (kind === "annual" || kind === "biennial")) {
      const inferred = G.inferKindFromLabel(indicator.targets[0].period_label);
      if (inferred !== "annual") kind = inferred;
    }
    const canPivot = (kind === "quarterly" || kind === "semestral" || kind === "monthly") && indicator.value_type !== "text";
    return canPivot ? pivotedPeriodValuesTable(indicator, actualMap, kind) : flatPeriodValuesTable(indicator, actualMap);
  }

  // ---------------------------------------------------------------
  // Lightweight self-contained SVG trend chart (Meta vs Real),
  // replacing the original Recharts <LineChart> which required a
  // React/bundler runtime not available in this static site.
  // ---------------------------------------------------------------
  function trendChartSvg(indicator) {
    const actualByPeriod = new Map(G.nationalActuals(indicator).map((a) => [a.period_label, a.actual_value]));
    const data = indicator.targets.map((t) => ({ period: t.period_label, meta: t.target_value, real: actualByPeriod.has(t.period_label) ? actualByPeriod.get(t.period_label) : null }));
    if (data.length === 0) return `<p class="text-sm muted">Sem metas definidas para traçar o gráfico.</p>`;

    const W = 720, H = 260, padL = 48, padR = 16, padT = 16, padB = 32;
    const vals = [];
    data.forEach((d) => { if (d.meta !== null && d.meta !== undefined) vals.push(d.meta); if (d.real !== null && d.real !== undefined) vals.push(d.real); });
    const maxV = vals.length ? Math.max(...vals, 0) : 1;
    const n = data.length;
    const xStep = n > 1 ? (W - padL - padR) / (n - 1) : 0;
    const xFor = (i) => padL + i * xStep;
    const yFor = (v) => H - padB - (maxV > 0 ? (v / maxV) * (H - padT - padB) : 0);

    function pathFor(key) {
      let d = "", started = false;
      data.forEach((pt, i) => {
        const v = pt[key];
        if (v === null || v === undefined) { started = false; return; }
        const x = xFor(i), y = yFor(v);
        d += (started ? "L" : "M") + x.toFixed(1) + "," + y.toFixed(1) + " ";
        started = true;
      });
      return d.trim();
    }
    const metaPath = pathFor("meta");
    const realPath = pathFor("real");

    const gridLines = [0, 0.25, 0.5, 0.75, 1]
      .map((f) => {
        const y = padT + f * (H - padT - padB);
        const v = Math.round(maxV * (1 - f));
        return `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="var(--border)" stroke-dasharray="3 3"/><text x="${padL - 8}" y="${y + 4}" text-anchor="end" font-size="10" fill="var(--muted-foreground)">${v >= 1000 ? Math.round(v / 1000) + "k" : v}</text>`;
      })
      .join("");

    const showEvery = n > 10 ? Math.ceil(n / 10) : 1;
    const xLabels = data
      .map((d, i) => (i % showEvery === 0 ? `<text x="${xFor(i).toFixed(1)}" y="${H - padB + 16}" text-anchor="middle" font-size="10" fill="var(--muted-foreground)">${G.escapeHtml(d.period)}</text>` : ""))
      .join("");

    const dots = (key, color) =>
      data
        .map((pt, i) => (pt[key] === null || pt[key] === undefined ? "" : `<circle cx="${xFor(i).toFixed(1)}" cy="${yFor(pt[key]).toFixed(1)}" r="3" fill="${color}"/>`))
        .join("");

    return `
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-height:280px;">
        ${gridLines}
        ${xLabels}
        <path d="${metaPath}" fill="none" stroke="var(--chart-1)" stroke-width="2" stroke-dasharray="5 4"/>
        <path d="${realPath}" fill="none" stroke="var(--chart-2)" stroke-width="2.5"/>
        ${dots("meta", "var(--chart-1)")}
        ${dots("real", "var(--chart-2)")}
      </svg>
      <div class="flex gap-3 text-xs muted mt-2">
        <span><span style="display:inline-block;width:0.6rem;height:0.6rem;border-radius:999px;background:var(--chart-1);margin-right:0.3rem;"></span>Meta</span>
        <span><span style="display:inline-block;width:0.6rem;height:0.6rem;border-radius:999px;background:var(--chart-2);margin-right:0.3rem;"></span>Real</span>
      </div>`;
  }

  // ---------------------------------------------------------------
  // Main render
  // ---------------------------------------------------------------
  function render() {
    const status = G.indicatorStatus(ind);
    const component = fw.components.find((c) => c.id === ind.component_id);
    const canRecord = fw.isAdmin || fw.role === "provincial";

    const subs = fw.indicators.filter((i) => i.parent_id === ind.id);

    document.getElementById("di-content").innerHTML = `
      <a href="indicators.html" class="text-sm muted">← Todos os indicadores</a>

      <div class="flex-between" style="align-items:flex-start;">
        <div>
          <div class="flex gap-2" style="align-items:center;flex-wrap:wrap;">
            <span class="badge ${G.STATUS_META[status].cls}">${G.STATUS_META[status].label}</span>
            <span class="badge">${G.LEVEL_LABELS[ind.level]}</span>
            ${component ? `<a href="component.html?id=${component.id}" class="badge" style="cursor:pointer;">${G.escapeHtml(component.code)}</a>` : ""}
          </div>
          <h1 class="text-xl mt-2" style="max-width:42rem;">${G.escapeHtml(ind.name)}</h1>
        </div>
        <div class="flex gap-2 flex-wrap">
          ${fw.isAdmin ? `<button class="btn btn-outline" id="di-edit-btn">✎ Editar</button><button class="btn btn-outline" id="di-delete-btn" style="color:var(--destructive);">🗑 Eliminar</button>` : ""}
          ${canRecord ? `<button class="btn btn-primary" id="di-record-btn">+ Registar valor</button>` : ""}
        </div>
      </div>

      <div class="grid grid-3">
        <div class="card"><div class="card-content"><p class="text-xs muted">Baseline</p><p class="text-lg font-semibold mt-1">${G.escapeHtml(ind.value_type === "text" || ind.value_type === "yes_no" ? ind.baseline_text ?? "—" : G.formatValue(ind.baseline_value, ind.value_type))}</p></div></div>
        <div class="card"><div class="card-content"><p class="text-xs muted">Meta final</p><p class="text-lg font-semibold mt-1">${G.escapeHtml(ind.value_type === "text" ? "—" : ind.value_type === "yes_no" ? ind.final_target_text ?? "—" : G.formatValue(ind.final_target, ind.value_type))}</p></div></div>
        <div class="card"><div class="card-content"><p class="text-xs muted">Frequência</p><p class="text-lg font-semibold mt-1">${G.escapeHtml(ind.frequency || "—")}</p></div></div>
      </div>

      ${
        ind.value_type !== "text" && ind.value_type !== "yes_no"
          ? `<div class="card"><div class="card-header"><p class="card-title">Meta vs. Real por período</p></div><div class="card-content">${trendChartSvg(ind)}</div></div>`
          : ""
      }

      <div class="card"><div class="card-header"><p class="card-title">Valores por período</p></div><div class="card-content" style="overflow-x:auto;">${periodValuesTable(ind)}</div></div>

      ${
        subs.length > 0
          ? `<div class="card"><div class="card-header"><p class="card-title">Subindicadores</p></div><div class="card-content-flush divide">
        ${subs
          .map((s) => {
            const sStatus = G.indicatorStatus(s);
            return `<a href="indicator.html?id=${s.id}" class="row-link">
              <span class="text-sm font-medium">${G.escapeHtml(s.name)}</span>
              <span class="flex gap-3" style="align-items:center;">
                <span class="text-sm muted">Meta ${G.escapeHtml(G.formatValue(s.final_target, s.value_type))}</span>
                <span class="badge ${G.STATUS_META[sStatus].cls}">${G.STATUS_META[sStatus].label}</span>
              </span>
            </a>`;
          })
          .join("")}
      </div></div>`
          : ""
      }

      <div class="card"><div class="card-header"><p class="card-title">Detalhes de monitoria</p></div>
        <div class="card-content grid grid-2 text-sm">
          <div style="grid-column:1/-1;"><p class="text-xs font-medium muted">Descrição</p><p class="mt-1">${G.escapeHtml(ind.description || "—")}</p></div>
          <div><p class="text-xs font-medium muted">Fonte de dados</p><p class="mt-1">${G.escapeHtml(ind.data_source || "—")}</p></div>
          <div><p class="text-xs font-medium muted">Metodologia de recolha</p><p class="mt-1">${G.escapeHtml(ind.methodology || "—")}</p></div>
          <div><p class="text-xs font-medium muted">Responsável pela recolha</p><p class="mt-1">${G.escapeHtml(ind.responsibility || "—")}</p></div>
          <div><p class="text-xs font-medium muted">Unidade de medida</p><p class="mt-1">${G.escapeHtml(ind.unit || "—")}</p></div>
        </div>
      </div>
    `;

    if (fw.isAdmin) {
      document.getElementById("di-edit-btn").addEventListener("click", openEditDialog);
      document.getElementById("di-delete-btn").addEventListener("click", openDeleteDialog);
    }
    if (canRecord) {
      document.getElementById("di-record-btn").addEventListener("click", openRecordDialog);
    }
  }

  // ---------------------------------------------------------------
  // Edit-indicator dialog
  // ---------------------------------------------------------------
  const compSel = document.getElementById("ifd-component");
  for (const c of fw.components) {
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = `${c.code} · ${c.title}`;
    compSel.appendChild(opt);
  }
  function toggleNumericRow() {
    const t = document.getElementById("ifd-value-type").value;
    document.getElementById("ifd-numeric-row").classList.toggle("hidden", t === "text" || t === "yes_no");
  }
  document.getElementById("ifd-value-type").addEventListener("change", toggleNumericRow);

  function openEditDialog() {
    document.getElementById("ifd-name").value = ind.name;
    document.getElementById("ifd-level").value = ind.level;
    document.getElementById("ifd-value-type").value = ind.value_type;
    document.getElementById("ifd-component").value = ind.component_id || "";
    document.getElementById("ifd-unit").value = ind.unit || "";
    document.getElementById("ifd-baseline").value = ind.baseline_value ?? "";
    document.getElementById("ifd-target").value = ind.final_target ?? "";
    document.getElementById("ifd-frequency").value = ind.frequency || "";
    document.getElementById("ifd-responsibility").value = ind.responsibility || "";
    document.getElementById("ifd-data-source").value = ind.data_source || "";
    document.getElementById("ifd-methodology").value = ind.methodology || "";
    document.getElementById("ifd-description").value = ind.description || "";
    toggleNumericRow();
    G.openDialog("dlg-indicator-form");
  }
  document.getElementById("ifd-cancel").addEventListener("click", () => G.closeDialog("dlg-indicator-form"));
  document.getElementById("ifd-save").addEventListener("click", async () => {
    const name = document.getElementById("ifd-name").value.trim();
    if (name.length < 2) { G.toast("Indique o nome do indicador.", "error"); return; }
    const valueType = document.getElementById("ifd-value-type").value;
    const isNumeric = valueType !== "text" && valueType !== "yes_no";
    const toNum = (s) => (s.trim() === "" ? null : Number(s));
    const btn = document.getElementById("ifd-save");
    G.setBusy(btn, true, "A guardar…");
    try {
      await G.saveIndicator({
        id: ind.id,
        name,
        unit: document.getElementById("ifd-unit").value.trim() || "Número",
        level: document.getElementById("ifd-level").value,
        value_type: valueType,
        component_id: document.getElementById("ifd-component").value || null,
        baseline_value: isNumeric ? toNum(document.getElementById("ifd-baseline").value) : null,
        final_target: isNumeric ? toNum(document.getElementById("ifd-target").value) : null,
        frequency: document.getElementById("ifd-frequency").value.trim() || null,
        data_source: document.getElementById("ifd-data-source").value.trim() || null,
        methodology: document.getElementById("ifd-methodology").value.trim() || null,
        responsibility: document.getElementById("ifd-responsibility").value.trim() || null,
        description: document.getElementById("ifd-description").value.trim() || null,
      });
      G.toast("Indicador actualizado.", "success");
      G.closeDialog("dlg-indicator-form");
      fw = await G.getFramework();
      ind = fw.indicators.find((i) => i.id === id);
      render();
    } catch (err) {
      G.toastError(err);
    } finally {
      G.setBusy(btn, false);
    }
  });

  // ---------------------------------------------------------------
  // Delete-indicator dialog
  // ---------------------------------------------------------------
  function openDeleteDialog() {
    document.getElementById("del-ind-desc").innerHTML = `Esta ação remove o indicador "${G.escapeHtml(ind.name)}" e todos os seus valores e metas. Não pode ser desfeita.`;
    G.openDialog("dlg-delete-indicator");
  }
  document.getElementById("del-ind-cancel").addEventListener("click", () => G.closeDialog("dlg-delete-indicator"));
  document.getElementById("del-ind-confirm").addEventListener("click", async () => {
    const btn = document.getElementById("del-ind-confirm");
    G.setBusy(btn, true, "A eliminar…");
    try {
      await G.deleteIndicator(ind.id);
      G.toast("Indicador eliminado.", "success");
      window.location.href = "indicators.html";
    } catch (err) {
      G.toastError(err);
      G.setBusy(btn, false);
    }
  });

  // ---------------------------------------------------------------
  // Record-value dialog
  // ---------------------------------------------------------------
  function fillSelect(sel, options, value) {
    sel.innerHTML = options.map((o) => `<option value="${G.escapeHtml(String(o.value))}">${G.escapeHtml(o.label)}</option>`).join("");
    sel.value = String(value);
  }

  function openRecordDialog() {
    const kind = G.periodKindFromFrequency(ind.frequency);
    const currentYear = new Date().getFullYear();
    const yearSet = new Set();
    for (const t of ind.targets) {
      const m = t.period_label.match(/(\d{4})/);
      if (m) yearSet.add(Number(m[1]));
    }
    for (let y = currentYear - 1; y <= currentYear + 8; y++) yearSet.add(y);
    const years = [...yearSet].sort((a, b) => a - b);
    const subs = G.subOptions(kind);

    const state = { year: currentYear, sub: subs[0] ? subs[0].value : 1, province: G.NATIONAL_PROVINCE, district: G.ALL_DISTRICTS, demographic: "geral", status: "geral" };

    document.getElementById("rv-indicator-name").textContent = ind.name;
    document.getElementById("rv-frequency-hint").innerHTML = `Frequência de reporte: <strong>${G.escapeHtml(G.PERIOD_KIND_LABELS[kind])}</strong>${ind.frequency && ind.frequency !== G.PERIOD_KIND_LABELS[kind] ? ` · <em>${G.escapeHtml(ind.frequency)}</em>` : ""}`;

    fillSelect(document.getElementById("rv-year"), years.map((y) => ({ value: y, label: kind === "biennial" ? `${y}–${y + 1}` : String(y) })), state.year);
    const subField = document.getElementById("rv-sub-field");
    if (subs.length > 0) {
      subField.classList.remove("hidden");
      document.getElementById("rv-sub-label").textContent = kind === "monthly" ? "Mês" : kind === "quarterly" ? "Trimestre" : "Semestre";
      fillSelect(document.getElementById("rv-sub"), subs, state.sub);
    } else {
      subField.classList.add("hidden");
    }

    fillSelect(document.getElementById("rv-province"), [{ value: G.NATIONAL_PROVINCE, label: G.NATIONAL_PROVINCE }, ...G.PROVINCES.map((p) => ({ value: p, label: p }))], state.province);
    fillSelect(document.getElementById("rv-district"), G.districtsFor(state.province).map((d) => ({ value: d, label: d })), state.district);
    document.getElementById("rv-district").disabled = state.province === G.NATIONAL_PROVINCE;
    fillSelect(document.getElementById("rv-demographic"), G.DEMOGRAPHICS, state.demographic);
    fillSelect(document.getElementById("rv-status"), G.BENEFICIARY_STATUS, state.status);

    const isText = ind.value_type === "text";
    const isYesNo = ind.value_type === "yes_no";
    document.getElementById("rv-text-field").classList.toggle("hidden", !isText);
    document.getElementById("rv-yesno-field").classList.toggle("hidden", !isYesNo);
    document.getElementById("rv-number-field").classList.toggle("hidden", isText || isYesNo);
    document.getElementById("rv-number-label").textContent = `Valor real ${ind.value_type === "percentage" ? "(%)" : `(${ind.unit})`}`;

    function updatePeriodInfo() {
      const { label } = G.makePeriod(kind, state.year, state.sub);
      const target = ind.targets.find((t) => t.period_label === label);
      let html = `Período: <strong>${G.escapeHtml(label)}</strong>`;
      if (target) {
        const metaTxt = isText ? target.target_text ?? "—" : G.formatValue(target.target_value, ind.value_type);
        html += ` · Meta: <strong>${G.escapeHtml(metaTxt)}</strong>`;
      }
      document.getElementById("rv-period-info").innerHTML = html;
      return label;
    }

    function loadExisting() {
      const label = updatePeriodInfo();
      const existing = ind.actuals.find(
        (a) => a.period_label === label && a.province === state.province && a.district === state.district && a.demographic === state.demographic && a.beneficiary_status === state.status,
      );
      document.getElementById("rv-number").value = existing && existing.actual_value !== null && existing.actual_value !== undefined ? String(existing.actual_value) : "";
      document.getElementById("rv-text").value = (existing && existing.actual_text) || "";
      document.getElementById("rv-yesno").value = existing && existing.actual_value !== null && existing.actual_value !== undefined ? String(existing.actual_value) : "";
      document.getElementById("rv-note").value = (existing && existing.note) || "";
    }

    document.getElementById("rv-year").onchange = (e) => { state.year = Number(e.target.value); loadExisting(); };
    document.getElementById("rv-sub").onchange = (e) => { state.sub = Number(e.target.value); loadExisting(); };
    document.getElementById("rv-province").onchange = (e) => {
      state.province = e.target.value;
      state.district = G.ALL_DISTRICTS;
      fillSelect(document.getElementById("rv-district"), G.districtsFor(state.province).map((d) => ({ value: d, label: d })), state.district);
      document.getElementById("rv-district").disabled = state.province === G.NATIONAL_PROVINCE;
      loadExisting();
    };
    document.getElementById("rv-district").onchange = (e) => { state.district = e.target.value; loadExisting(); };
    document.getElementById("rv-demographic").onchange = (e) => { state.demographic = e.target.value; loadExisting(); };
    document.getElementById("rv-status").onchange = (e) => { state.status = e.target.value; loadExisting(); };

    loadExisting();

    // Evidence controls
    function refreshEvidenceUi() {
      const ev = ind.evidence;
      document.getElementById("rv-evidence-date").textContent = ev ? `Actualizado ${new Date(ev.updated_at).toLocaleDateString("pt-PT")}` : "";
      document.getElementById("rv-evidence-view-btn").classList.toggle("hidden", !ev);
      document.getElementById("rv-evidence-remove-btn").classList.toggle("hidden", !ev);
      document.getElementById("rv-evidence-name").textContent = (ev && ev.file_name) || "";
      document.getElementById("rv-evidence-upload-btn").textContent = ev ? "Substituir PDF" : "Carregar PDF";
    }
    refreshEvidenceUi();

    const fileInput = document.getElementById("rv-evidence-file");
    document.getElementById("rv-evidence-upload-btn").onclick = () => fileInput.click();
    fileInput.onchange = async (e) => {
      const file = e.target.files && e.target.files[0];
      fileInput.value = "";
      if (!file) return;
      if (file.type !== "application/pdf") { G.toast("Apenas ficheiros PDF são aceites.", "error"); return; }
      if (file.size > 20 * 1024 * 1024) { G.toast("Ficheiro demasiado grande (máx. 20 MB).", "error"); return; }
      const btn = document.getElementById("rv-evidence-upload-btn");
      G.setBusy(btn, true, "A carregar…");
      try {
        await G.uploadEvidence(ind.id, file);
        G.toast("Evidência carregada.", "success");
        fw = await G.getFramework();
        ind = fw.indicators.find((i) => i.id === id);
        refreshEvidenceUi();
      } catch (err) {
        G.toastError(err);
      } finally {
        G.setBusy(btn, false);
      }
    };
    document.getElementById("rv-evidence-view-btn").onclick = async () => {
      try {
        const url = await G.getEvidenceUrl(ind.id);
        if (url) window.open(url, "_blank", "noopener,noreferrer");
        else G.toast("Sem evidência disponível.", "error");
      } catch (err) {
        G.toastError(err);
      }
    };
    document.getElementById("rv-evidence-remove-btn").onclick = async () => {
      try {
        await G.deleteEvidence(ind.id);
        G.toast("Evidência removida.", "success");
        fw = await G.getFramework();
        ind = fw.indicators.find((i) => i.id === id);
        refreshEvidenceUi();
      } catch (err) {
        G.toastError(err);
      }
    };

    document.getElementById("rv-cancel-btn").onclick = () => G.closeDialog("dlg-record-value");

    document.getElementById("rv-save-btn").onclick = async () => {
      const { label, order } = G.makePeriod(kind, state.year, state.sub);
      let numeric = null;
      if (isYesNo) {
        numeric = document.getElementById("rv-yesno").value === "1" ? 1 : 0;
      } else if (!isText) {
        const raw = document.getElementById("rv-number").value;
        numeric = raw === "" ? null : Number(raw);
        if (numeric !== null && Number.isNaN(numeric)) { G.toast("Valor numérico inválido.", "error"); return; }
      }
      const btn = document.getElementById("rv-save-btn");
      G.setBusy(btn, true, "A guardar…");
      try {
        await G.upsertActual({
          indicator_id: ind.id,
          period_label: label,
          period_order: order,
          province: state.province,
          district: state.district,
          demographic: state.demographic,
          beneficiary_status: state.status,
          actual_value: numeric,
          actual_text: isText ? document.getElementById("rv-text").value || null : null,
          note: document.getElementById("rv-note").value || null,
        });
        G.toast("Valor submetido. Aguarda aprovação do administrador.", "success");
        G.closeDialog("dlg-record-value");
        fw = await G.getFramework();
        ind = fw.indicators.find((i) => i.id === id);
        render();
      } catch (err) {
        G.toastError(err);
      } finally {
        G.setBusy(btn, false);
      }
    };

    document.getElementById("rv-remove-btn").onclick = async () => {
      const { label } = G.makePeriod(kind, state.year, state.sub);
      const btn = document.getElementById("rv-remove-btn");
      G.setBusy(btn, true, "A remover…");
      try {
        await G.deleteActual({ indicator_id: ind.id, period_label: label, province: state.province, district: state.district, demographic: state.demographic, beneficiary_status: state.status });
        G.toast("Valor removido.", "success");
        G.closeDialog("dlg-record-value");
        fw = await G.getFramework();
        ind = fw.indicators.find((i) => i.id === id);
        render();
      } catch (err) {
        G.toastError(err);
      } finally {
        G.setBusy(btn, false);
      }
    };

    G.openDialog("dlg-record-value");
  }

  render();
  document.getElementById("di-loading").classList.add("hidden");
  document.getElementById("di-content").classList.remove("hidden");
})();
</script>
</body>
</html>
