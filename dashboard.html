<!DOCTYPE html>
<html lang="pt-MZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Indicadores — M&amp;E MozCommunity</title>
<link rel="icon" href="img/logo-adin.jpg" type="image/jpeg">
<link rel="stylesheet" href="css/style.css">
<style>
  .admin-shell { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 76px); }
  .admin-sidebar { border-right: 1px solid var(--line); padding: 24px 18px; background: var(--paper-raised); }
  .admin-sidebar h4 { font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-muted); margin: 20px 0 8px; }
  .admin-sidebar h4:first-child { margin-top: 0; }
  .filter-option { display: block; width: 100%; text-align: left; background: none; border: none; padding: 7px 10px; border-radius: 7px; font-size: 0.85rem; color: var(--slate); cursor: pointer; font-family: var(--font-body); }
  .filter-option:hover { background: var(--teal-tint); }
  .filter-option.is-active { background: var(--teal); color: #fff; font-weight: 600; }
  .admin-main { padding: 24px 28px; }
  table.cases { width: 100%; border-collapse: collapse; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  table.cases th { text-align: left; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-muted); padding: 12px 14px; border-bottom: 1px solid var(--line); font-family: var(--font-mono); font-weight: 500;}
  table.cases td { padding: 13px 14px; border-bottom: 1px solid var(--line); font-size: 0.86rem; vertical-align: middle; }
  table.cases tr:last-child td { border-bottom: none; }
  table.cases tr { cursor: pointer; }
  table.cases tr:hover td { background: var(--teal-tint); }
  .progress-bar { width: 100%; height: 8px; border-radius: 999px; background: var(--line); overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--teal); }
  .level-tag { font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: var(--gold-tint); color: #8A5F13; }
  .drawer-overlay { position: fixed; inset: 0; background: rgba(24,36,48,0.5); z-index: 90; display: none; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(560px, 100vw); background: var(--paper); z-index: 91; transform: translateX(100%); transition: transform 0.22s ease; overflow-y: auto; display: none; }
  .drawer.is-open { display: block; }
  .drawer.is-open.animate-in { transform: translateX(0); }
  .drawer-close { position: absolute; top: 20px; right: 20px; background: none; border: none; cursor: pointer; color: var(--ink-muted); font-size: 1.4rem; line-height: 1; }
  .targets-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin: 10px 0 20px; }
  .targets-table th, .targets-table td { padding: 6px 8px; border-bottom: 1px solid var(--line); text-align: left; }
  @media (max-width: 860px) {
    .admin-shell { grid-template-columns: 1fr; }
    .admin-sidebar { border-right: none; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; align-items: center; gap: 6px; padding: 14px 16px; }
    .admin-sidebar h4 { width: 100%; margin: 6px 0 0; }
    .admin-sidebar h4:first-child { margin-top: 0; }
    .admin-sidebar .filter-option { width: auto; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; }
    .admin-sidebar .filter-option.is-active { border-color: var(--teal); }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">
      <span class="brand-mark"><img src="img/logo-adin.jpg" alt="Logótipo ADIN"></span>
      <span class="brand-name">M&amp;E MozCommunity<small>Monitoria de Indicadores — ADIN</small></span>
    </a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menu" aria-expanded="false">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <nav class="main-nav">
      <a href="dashboard.html" class="is-active">Indicadores</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="approvals.html" id="approvals-link" style="display:none;">Aprovações</a>
      <a href="users.html" id="users-link" style="display:none;">Utilizadores</a>
      <span class="small-note" id="admin-name-label" style="margin-right:8px;"></span>
      <a href="#" id="logout-link">Sair</a>
    </nav>
  </div>
</header>

<div class="admin-shell">
  <aside class="admin-sidebar">
    <h4>Nível</h4>
    <button class="filter-option is-active" data-filter="level" data-value="">Todos</button>
    <button class="filter-option" data-filter="level" data-value="PrDO">PrDO (Programa)</button>
    <button class="filter-option" data-filter="level" data-value="PDO">PDO (Projecto)</button>
    <button class="filter-option" data-filter="level" data-value="Intermédio">Intermédio</button>

    <h4>Componente</h4>
    <div id="component-filters"></div>
  </aside>

  <main class="admin-main">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:12px; flex-wrap:wrap;">
      <div>
        <h2 style="margin:0;">Indicadores do Quadro de Resultados</h2>
        <p class="small-note" style="margin:2px 0 0;" id="results-count">A carregar...</p>
      </div>
    </div>

    <table class="cases">
      <thead><tr><th>Nível</th><th>Indicador</th><th>Base</th><th>Último valor aprovado</th><th>Meta final</th><th>Progresso</th></tr></thead>
      <tbody id="indicators-tbody">
        <tr><td colspan="6" class="skeleton" style="height:40px;"></td></tr>
      </tbody>
    </table>
  </main>
</div>

<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-inner" id="drawer-content" style="padding:26px;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/store.js"></script>
<script>
let currentAdmin = null;
let state = { level: '', component: '' };

ME.onAuthChange(admin => {
  if (!admin) { window.location.href = 'index.html'; return; }
  if (admin.noProfile) {
    alert('A tua conta não tem permissões configuradas nesta plataforma. Contacta o administrador.');
    ME.adminLogout().then(() => window.location.href = 'index.html');
    return;
  }
  currentAdmin = admin;
  const roleLabels = { admin: 'Administrador geral', submitter: 'Equipa de reporte', readonly: 'Só leitura' };
  document.getElementById('admin-name-label').textContent = `${admin.name} · ${roleLabels[admin.role] || admin.role}`;
  document.getElementById('approvals-link').style.display = admin.role === 'admin' ? '' : 'none';
  document.getElementById('users-link').style.display = admin.role === 'admin' ? '' : 'none';

  renderComponentFilters();
  loadIndicators();
});

document.getElementById('logout-link').addEventListener('click', (e) => {
  e.preventDefault();
  ME.adminLogout().then(() => window.location.href = 'index.html');
});

function renderComponentFilters() {
  const el = document.getElementById('component-filters');
  el.innerHTML = `<button class="filter-option is-active" data-filter="component" data-value="">Todas</button>` +
    ME.getComponents().map(c => `<button class="filter-option" data-filter="component" data-value="${c}">${c.replace('Componente ', 'C.')}</button>`).join('');
}

document.querySelector('.admin-sidebar').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-option');
  if (!btn) return;
  const group = btn.dataset.filter;
  document.querySelectorAll(`.filter-option[data-filter="${group}"]`).forEach(b => b.classList.remove('is-active'));
  btn.classList.add('is-active');
  state[group] = btn.dataset.value;
  loadIndicators();
});

async function loadIndicators() {
  const tbody = document.getElementById('indicators-tbody');
  tbody.innerHTML = `<tr><td colspan="6" class="skeleton" style="height:40px;"></td></tr>`;

  let indicators = ME.getIndicators();
  if (state.level) indicators = indicators.filter(i => i.level === state.level);
  if (state.component) indicators = indicators.filter(i => i.component === state.component);

  document.getElementById('results-count').textContent = `${indicators.length} indicador(es)`;

  try {
    const rowsHtml = await Promise.all(indicators.map(async (ind) => {
      const approved = await ME.listApprovedValues(ind.id);
      approved.sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at));
      const latest = approved[0];
      const finalTarget = ind.targets[ind.targets.length - 1];
      const isNumeric = !ind.isTextIndicator && !ind.isYesNoIndicator;
      let progressHtml = '<span class="small-note">—</span>';
      if (isNumeric && latest && typeof finalTarget.value === 'number' && finalTarget.value > 0) {
        const pct = Math.min(100, Math.round((Number(latest.value) / finalTarget.value) * 100));
        progressHtml = `<div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%;"></div></div><span class="small-note">${pct}%</span>`;
      }
      return `
        <tr data-id="${ind.id}">
          <td><span class="level-tag">${ind.level}</span></td>
          <td>${escapeHtml(ind.name)}</td>
          <td class="small-note">${escapeHtml(String(ind.baseline))}</td>
          <td>${latest ? `${escapeHtml(String(latest.value))} <span class="small-note">(${escapeHtml(latest.period)})</span>` : '<span class="small-note">Sem valor aprovado</span>'}</td>
          <td class="small-note">${escapeHtml(String(finalTarget.value))} <span class="small-note">(${finalTarget.period})</span></td>
          <td>${progressHtml}</td>
        </tr>
      `;
    }));

    if (!rowsHtml.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="small-note" style="padding:24px;">Nenhum indicador encontrado com estes filtros.</td></tr>`;
      return;
    }
    tbody.innerHTML = rowsHtml.join('');
    tbody.querySelectorAll('tr[data-id]').forEach(tr => {
      tr.addEventListener('click', () => openDrawer(tr.dataset.id));
    });
  } catch (err) {
    console.error(err);
    tbody.innerHTML = `<tr><td colspan="6"><div class="alert alert-error">Não foi possível carregar os indicadores.</div></td></tr>`;
  }
}

const overlay = document.getElementById('drawer-overlay');
const drawer = document.getElementById('drawer');
overlay.addEventListener('click', closeDrawer);
function closeDrawer() {
  drawer.classList.remove('animate-in');
  drawer.classList.remove('is-open');
  overlay.style.display = 'none';
  setTimeout(() => { drawer.style.display = 'none'; }, 200);
}

async function openDrawer(indicatorId) {
  drawer.style.display = 'block';
  drawer.classList.add('is-open');
  overlay.style.display = 'block';
  requestAnimationFrame(() => drawer.classList.add('animate-in'));
  document.getElementById('drawer-content').innerHTML = `<div class="skeleton" style="height:200px;"></div>`;

  try {
    const indicator = ME.getIndicator(indicatorId);
    const allValues = await ME.listValues({ indicator_id: indicatorId });
    renderDrawer(indicator, allValues);
  } catch (err) {
    console.error(err);
    document.getElementById('drawer-content').innerHTML = `<div class="alert alert-error">Não foi possível carregar o indicador.</div>`;
  }
}

function renderDrawer(ind, values) {
  const targetsRows = ind.targets.map(t => `<tr><td>${t.period}</td><td>${escapeHtml(String(t.value))}${t.disagg ? ' · ' + Object.entries(t.disagg).map(([k,v]) => `${k}: ${v}`).join(', ') : ''}</td></tr>`).join('');

  const statusBadge = { submetido: 'badge-em_analise', aprovado: 'badge-resolvida', rejeitado: 'badge-encerrada' };
  const statusLabel = { submetido: 'Submetido', aprovado: 'Aprovado', rejeitado: 'Rejeitado' };

  const historyHtml = values.length ? values.map(v => `
    <li>
      <span class="node"></span>
      <div class="tl-status">
        <span class="badge ${statusBadge[v.status]}">${statusLabel[v.status]}</span>
        ${escapeHtml(v.period)}: <strong>${escapeHtml(String(v.value))}</strong>
        ${v.disagg ? ' · ' + Object.entries(v.disagg).map(([k,val]) => `${k}: ${val}`).join(', ') : ''}
      </div>
      ${v.note ? `<div class="tl-note">${escapeHtml(v.note)}</div>` : ''}
      ${(v.evidence || []).map(e => `<div class="tl-note"><a href="${e.dataUrl}" download="${escapeHtml(e.name)}" class="btn btn-secondary btn-sm">📎 ${escapeHtml(e.name)}</a></div>`).join('')}
      <div class="tl-date">Submetido por ${escapeHtml(v.submitted_by)} · ${formatDate(v.submitted_at)}</div>
      ${v.reviewed_by ? `<div class="tl-date">Revisto por ${escapeHtml(v.reviewed_by)} · ${formatDate(v.reviewed_at)}${v.review_note ? ' · ' + escapeHtml(v.review_note) : ''}</div>` : ''}
      ${(currentAdmin.role === 'admin' && v.status === 'submetido') ? `
        <div style="display:flex; gap:8px; margin-top:6px;">
          <button type="button" class="btn btn-primary btn-sm review-btn" data-id="${v.id}" data-approve="true">Aprovar</button>
          <button type="button" class="btn btn-secondary btn-sm review-btn" data-id="${v.id}" data-approve="false">Rejeitar</button>
        </div>
      ` : ''}
    </li>
  `).join('') : '<li class="small-note">Ainda não há submissões para este indicador.</li>';

  const canSubmit = currentAdmin && currentAdmin.role !== 'readonly';
  const disaggFieldsHtml = (ind.disaggregation || []).map(d => `
    <div class="field">
      <label>${escapeHtml(d)}</label>
      <input type="number" class="disagg-input" data-key="${escapeHtml(d)}" placeholder="Opcional">
    </div>
  `).join('');

  const periodFields = ME.getSubmissionPeriodFields(ind);
  let periodFieldsHtml = '';
  if (periodFields.mode === 'year+sub') {
    periodFieldsHtml = `
      <div class="form-row">
        <div class="field">
          <label for="val-year">Ano</label>
          <select id="val-year">${periodFields.years.map(y => `<option value="${y}">${y}</option>`).join('')}</select>
        </div>
        <div class="field">
          <label for="val-sub">${escapeHtml(periodFields.subLabel)}</label>
          <select id="val-sub">${periodFields.subOptions.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('')}</select>
        </div>
      </div>
    `;
  } else if (periodFields.mode === 'year-only') {
    periodFieldsHtml = `
      <div class="field">
        <label for="val-year">${periodFields.biennial ? 'Ano de início do biénio' : 'Ano'}</label>
        <select id="val-year">${periodFields.years.map(y => `<option value="${y}">${y}${periodFields.biennial ? '–' + (y + 1) : ''}</option>`).join('')}</select>
      </div>
    `;
  } else {
    periodFieldsHtml = `
      <div class="field">
        <label for="val-sub">Período</label>
        <select id="val-sub">${periodFields.options.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}</select>
      </div>
    `;
  }

  const submitFormHtml = canSubmit ? `
    <h4 style="font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-muted); margin:24px 0 8px;">Submeter novo valor</h4>
    <div id="submit-alert"></div>
    <div class="form-card" style="padding:18px;">
      <p class="small-note" style="margin:0 0 12px;">Periodicidade deste indicador: <strong>${escapeHtml(ind.frequency)}</strong></p>
      ${periodFieldsHtml}
      <div class="field">
        <label for="val-value">Valor ${ind.isYesNoIndicator ? '(Sim/Não)' : ind.isTextIndicator ? '(descrição)' : `(${ind.unit})`}</label>
        ${ind.isYesNoIndicator
          ? `<select id="val-value"><option value="Sim">Sim</option><option value="Não">Não</option></select>`
          : ind.isTextIndicator
            ? `<textarea id="val-value" placeholder="Descreva o estado actual"></textarea>`
            : `<input type="number" id="val-value" placeholder="Ex: 25">`
        }
      </div>
      ${disaggFieldsHtml}
      <div class="field">
        <label for="val-note">Nota / fonte de verificação</label>
        <textarea id="val-note" placeholder="Ex: relatório trimestral do distrito X"></textarea>
      </div>
      <div class="field">
        <label for="val-evidence">Anexar evidência (opcional)</label>
        <input type="file" id="val-evidence" accept=".jpg,.jpeg,.png,.webp,.pdf" style="padding:8px;">
        <div class="hint">Até 200KB, 2 ficheiros.</div>
      </div>
      <button type="button" class="btn btn-primary btn-block" id="submit-value-btn">Submeter para aprovação</button>
    </div>
  ` : '';

  document.getElementById('drawer-content').innerHTML = `
    <button class="drawer-close" onclick="closeDrawer()">&times;</button>
    <span class="level-tag">${ind.level}</span>
    <h2 style="font-size:1.25rem; margin:8px 0 4px;">${escapeHtml(ind.name)}</h2>
    <p class="small-note">${ind.component ? escapeHtml(ind.component) + ' · ' : ''}${escapeHtml(ind.unit)} · ${escapeHtml(ind.frequency)} · Responsável: ${escapeHtml(ind.responsible)}</p>
    <p class="small-note">Base (Mai/2026): <strong>${escapeHtml(String(ind.baseline))}</strong></p>

    <h4 style="font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-muted); margin:20px 0 4px;">Metas por período</h4>
    <table class="targets-table"><thead><tr><th>Período</th><th>Meta</th></tr></thead><tbody>${targetsRows}</tbody></table>

    <h4 style="font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-muted); margin:20px 0 8px;">Histórico de submissões</h4>
    <ul class="thread-timeline">${historyHtml}</ul>

    ${submitFormHtml}
  `;

  document.querySelectorAll('.review-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const approve = btn.dataset.approve === 'true';
      const note = approve ? null : (prompt('Motivo da rejeição (opcional):') || null);
      try {
        await ME.reviewValue(btn.dataset.id, { approve, review_note: note });
        openDrawer(ind.id);
        loadIndicators();
      } catch (err) {
        console.error(err);
        alert(err.message || 'Não foi possível actualizar.');
      }
    });
  });

  const submitBtn = document.getElementById('submit-value-btn');
  if (submitBtn) {
    submitBtn.addEventListener('click', async () => {
      const alertEl = document.getElementById('submit-alert');
      alertEl.innerHTML = '';
      const disagg = {};
      document.querySelectorAll('.disagg-input').forEach(inp => {
        if (inp.value !== '') disagg[inp.dataset.key] = Number(inp.value);
      });
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>';
      try {
        const fileList = document.getElementById('val-evidence').files;
        const yearEl = document.getElementById('val-year');
        const subEl = document.getElementById('val-sub');
        const period = ME.combinePeriod(periodFields, yearEl ? Number(yearEl.value) : null, subEl ? subEl.value : null);
        const result = await ME.submitValue({
          indicator_id: ind.id,
          period,
          value: document.getElementById('val-value').value,
          disagg: Object.keys(disagg).length ? disagg : null,
          note: document.getElementById('val-note').value,
        }, fileList);
        if (result.skipped && result.skipped.length) {
          alert(`O ficheiro "${result.skipped.join(', ')}" não foi anexado por exceder 200KB.`);
        }
        openDrawer(ind.id);
      } catch (err) {
        console.error(err);
        alertEl.innerHTML = `<div class="alert alert-error">${err.message || 'Não foi possível submeter.'}</div>`;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submeter para aprovação';
      }
    });
  }
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-MZ', { day: '2-digit', month: 'short', year: 'numeric' });
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

document.getElementById('nav-toggle')?.addEventListener('click', () => {
  const nav = document.querySelector('.main-nav');
  const open = nav.classList.toggle('is-open');
  document.getElementById('nav-toggle').setAttribute('aria-expanded', String(open));
});
</script>
</body>
</html>
