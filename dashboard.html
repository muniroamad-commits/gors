<!DOCTYPE html>
<html lang="pt-MZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Indicadores — GORS - MOZCOMMUNITY</title>
<link rel="icon" href="img/logo-adin.jpg" type="image/jpeg">
<link rel="stylesheet" href="css/style.css">
<style>
  /* Nesta página o corpo usa uma barra lateral a toda a largura (sem o
     limite de largura do .container padrão) — por isso o cabeçalho
     também precisa de ocupar a largura toda, para o logótipo ficar
     mesmo encostado ao canto, alinhado com a barra lateral por baixo. */
  .site-header .container { max-width: none; width: 100%; }
  .admin-shell { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 76px); }
  .admin-sidebar { border-right: 1px solid var(--line); padding: 24px 18px; background: var(--paper-raised); }
  .admin-sidebar h4 { font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-muted); margin: 20px 0 8px; }
  .admin-sidebar h4:first-child { margin-top: 0; }
  .filter-option { display: block; width: 100%; text-align: left; background: none; border: none; padding: 7px 10px; border-radius: 7px; font-size: 0.85rem; color: var(--slate); cursor: pointer; font-family: var(--font-body); }
  .filter-option:hover { background: var(--teal-tint); }
  .filter-option.is-active { background: var(--teal); color: #fff; font-weight: 600; }
  .admin-main { padding: 24px 28px; }
  table.cases { width: 100%; border-collapse: collapse; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  table.cases th { text-align: left; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-muted); padding: 12px 14px; border-bottom: 1px solid var(--line); font-family: var(--font-mono); font-weight: 500;}
  table.cases td { padding: 13px 14px; border-bottom: 1px solid var(--line); font-size: 0.86rem; vertical-align: middle; }
  table.cases tr:last-child td { border-bottom: none; }
  table.cases tr { cursor: pointer; }
  table.cases tr:hover td { background: var(--teal-tint); }
  .stage-flag { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .stage-flag.atraso { background: #FCEAEA; color: #C81E2D; }
  .stage-flag.alcancada { background: #E6F4EA; color: #1F8A4C; }
  .stage-flag.prazo { background: #FFF6DC; color: #A8760C; }
  .progress-bar { width: 100%; height: 8px; border-radius: 999px; background: var(--line); overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--teal); }
  .level-tag { font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: var(--gold-tint); color: #8A5F13; }
  .drawer-overlay { position: fixed; inset: 0; background: rgba(24,36,48,0.5); z-index: 90; display: none; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(560px, 100vw); background: var(--paper); z-index: 91; transform: translateX(100%); transition: transform 0.22s ease; overflow-y: auto; display: none; }
  .drawer.is-open { display: block; }
  .drawer.is-open.animate-in { transform: translateX(0); }
  .drawer-close { position: absolute; top: 20px; right: 20px; background: none; border: none; cursor: pointer; color: var(--ink-muted); font-size: 1.4rem; line-height: 1; }
  .targets-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin: 10px 0 20px; }
  .targets-table th, .targets-table td { padding: 6px 8px; border-bottom: 1px solid var(--line); text-align: left; }
  @media (max-width: 860px) {
    .admin-shell { grid-template-columns: 1fr; }
    .admin-sidebar { border-right: none; border-bottom: 1px solid var(--line); display: flex; flex-wrap: wrap; align-items: center; gap: 6px; padding: 14px 16px; }
    .admin-sidebar h4 { width: 100%; margin: 6px 0 0; }
    .admin-sidebar h4:first-child { margin-top: 0; }
    .admin-sidebar .filter-option { width: auto; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; }
    .admin-sidebar .filter-option.is-active { border-color: var(--teal); }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">
      <span class="brand-mark"><img src="img/logo-adin.jpg" alt="Logótipo ADIN"></span>
      <span class="brand-name">GORS - MOZCOMMUNITY<small>Monitoria de Indicadores — ADIN</small></span>
    </a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menu" aria-expanded="false">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <nav class="main-nav">
      <a href="dashboard.html" class="is-active">Indicadores</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="approvals.html" id="approvals-link" style="display:none;">Aprovações</a>
      <a href="users.html" id="users-link" style="display:none;">Utilizadores</a>
      <span class="small-note" id="admin-name-label" style="margin-right:8px;"></span>
            <a href="approvals.html" id="notif-bell" title="Aprovações pendentes" style="display:none; position:relative; text-decoration:none; color:var(--ink); margin-right:6px; font-size:1.1rem;">
        🔔<span id="notif-badge" style="display:none; position:absolute; top:-6px; right:-10px; background:var(--brick); color:#fff; font-size:0.62rem; font-weight:700; padding:1px 5px; border-radius:999px; line-height:1.3;">0</span>
      </a>
      <a href="#" id="logout-link">Sair</a>
    </nav>
  </div>
</header>

<div class="admin-shell">
  <aside class="admin-sidebar">
    <h4>Nível</h4>
    <button class="filter-option is-active" data-filter="level" data-value="">Todos</button>
    <button class="filter-option" data-filter="level" data-value="PrDO">PrDO (Programa)</button>
    <button class="filter-option" data-filter="level" data-value="PDO">PDO (Projecto)</button>
    <button class="filter-option" data-filter="level" data-value="Intermédio" id="filter-intermediate">Intermédio</button>

    <h4>Componente</h4>
    <div id="component-filters"></div>
  </aside>

  <main class="admin-main">
    <div id="overdue-alert" style="display:none; margin-bottom:18px; padding:14px 16px; border-radius:10px; background:#FCEAEA; border:1px solid #E4A4A9; color:#7A1921; font-size:0.88rem;"></div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; gap:12px; flex-wrap:wrap;">
      <div>
        <h2 style="margin:0;">Indicadores do Quadro de Resultados</h2>
        <p class="small-note" style="margin:2px 0 0;" id="results-count">A carregar...</p>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" id="reset-values-btn" class="btn btn-secondary btn-sm" style="display:none; border-color:var(--brick); color:var(--brick);">Zerar todos os valores</button>
        <a href="indicator-edit.html" id="add-indicator-link" class="btn btn-primary btn-sm" style="display:none;">+ Adicionar indicador</a>
      </div>
    </div>

    <table class="cases">
      <thead><tr><th>Nível</th><th>Indicador</th><th>Base</th><th>Valor actual</th><th>Meta final</th><th>Progresso</th><th>Estágio</th><th id="reorder-th" style="display:none;"></th></tr></thead>
      <tbody id="indicators-tbody">
        <tr><td colspan="8" class="skeleton" style="height:40px;"></td></tr>
      </tbody>
    </table>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/store.js"></script>
<script>

let currentAdmin = null;
let state = { level: '', component: '' };

ME.onAuthChange(admin => {
  if (!admin) { window.location.href = 'index.html'; return; }
  if (admin.noProfile) {
    alert('A tua conta não tem permissões configuradas nesta plataforma. Contacta o administrador.');
    ME.adminLogout().then(() => window.location.href = 'index.html');
    return;
  }
  currentAdmin = admin;
  const roleLabels = { admin: 'Administrador geral', submitter: 'Equipa de reporte', readonly: 'Só leitura' };
  document.getElementById('admin-name-label').textContent = `${admin.name} · ${roleLabels[admin.role] || admin.role}`;
  document.getElementById('approvals-link').style.display = admin.role === 'admin' ? '' : 'none';
  document.getElementById('users-link').style.display = admin.role === 'admin' ? '' : 'none';
  document.getElementById('add-indicator-link').style.display = admin.role === 'admin' ? '' : 'none';
  document.getElementById('reset-values-btn').style.display = admin.role === 'admin' ? '' : 'none';

  renderComponentFilters();
  loadIndicators();
  checkOverdueAlerts();
});

document.getElementById('logout-link').addEventListener('click', (e) => {
  e.preventDefault();
  ME.adminLogout().then(() => window.location.href = 'index.html');
});

document.getElementById('reset-values-btn').addEventListener('click', async () => {
  const en = false;
  const confirmWord = en ? 'RESET ALL' : 'ZERAR TUDO';
  const promptMsg = en
    ? `This PERMANENTLY deletes all submitted, approved, and rejected values for ALL indicators (the indicator catalog itself is not deleted). This cannot be undone. To confirm, type exactly: ${confirmWord}`
    : `Isto apaga PERMANENTEMENTE todos os valores submetidos, aprovados e rejeitados de TODOS os indicadores (o catálogo de indicadores em si não é apagado). Não há forma de recuperar depois. Para confirmar, escreve exactamente: ${confirmWord}`;
  const typed = prompt(promptMsg);
  if (typed !== confirmWord) {
    if (typed !== null) alert(en ? 'Text does not match — nothing was deleted.' : 'Texto não corresponde — nada foi apagado.');
    return;
  }
  try {
    const n = await ME.resetAllValues();
    alert(en ? `${n} record(s) deleted.` : `${n} registo(s) apagado(s).`);
    loadIndicators();
  } catch (err) {
    console.error(err);
    alert(err.message || (en ? 'Could not reset the values.' : 'Não foi possível zerar os valores.'));
  }
});

function renderComponentFilters() {
  const el = document.getElementById('component-filters');
  el.innerHTML = `<button class="filter-option is-active" data-filter="component" data-value="">${'Todas'}</button>` +
    ME.getComponents().map(c => `<button class="filter-option" data-filter="component" data-value="${c}">${escapeHtml((c).replace(/^(Componente|Component) /, 'C.'))}</button>`).join('');
}

document.querySelector('.admin-sidebar').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-option');
  if (!btn) return;
  const group = btn.dataset.filter;
  document.querySelectorAll(`.filter-option[data-filter="${group}"]`).forEach(b => b.classList.remove('is-active'));
  btn.classList.add('is-active');
  state[group] = btn.dataset.value;
  loadIndicators();
});

// Verifica TODOS os indicadores (independentemente dos filtros da lista)
// e mostra um alerta se algum estiver "em atraso" — meta com prazo
// vencido (fim do mês + 15 dias) e ainda sem valor aprovado suficiente.
async function checkOverdueAlerts() {
  const banner = document.getElementById('overdue-alert');
  try {
    const indicators = await ME.getIndicators();
    const results = await Promise.all(indicators.map(async (ind) => {
      const approved = await ME.listApprovedValues(ind.id);
      const isNumeric = !ind.isTextIndicator && !ind.isYesNoIndicator;
      let currentValue = null;
      if (isNumeric) {
        if (approved.length) currentValue = approved.reduce((sum, v) => sum + (Number(v.value) || 0), 0);
      } else if (approved.length) {
        approved.sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at));
        currentValue = approved[0].value;
      }
      return { ind, stage: ME.classifyStage(ind, currentValue) };
    }));
    const overdue = results.filter(r => r.stage === 'atraso');
    if (overdue.length) {
      const en = false;
      const names = overdue.slice(0, 5).map(r => escapeHtml(r.ind.name)).join('; ');
      const label = en ? `${overdue.length} indicator${overdue.length > 1 ? 's' : ''} overdue` : `${overdue.length} indicador${overdue.length > 1 ? 'es' : ''} em atraso`;
      const rest = en ? '— target deadline already passed and still without a sufficient approved value:' : '— meta com prazo já vencido e ainda sem valor aprovado suficiente:';
      banner.innerHTML = `⚠️ <strong>${label}</strong> ${rest} ${names}${overdue.length > 5 ? '…' : ''}`;
      banner.style.display = 'block';
    } else {
      banner.style.display = 'none';
    }
  } catch (err) {
    console.error('Não foi possível verificar indicadores em atraso:', err);
  }
}

async function loadIndicators() {
  const tbody = document.getElementById('indicators-tbody');
  tbody.innerHTML = `<tr><td colspan="8" class="skeleton" style="height:40px;"></td></tr>`;

  let indicators = await ME.getIndicators();
  if (state.level) indicators = indicators.filter(i => i.level === state.level);
  if (state.component) indicators = indicators.filter(i => i.component === state.component);

  document.getElementById('results-count').textContent = `${indicators.length} indicador(es)`;

  try {
    const rowsHtml = await Promise.all(indicators.map(async (ind0) => {
      const ind = ind0;
      const approved = await ME.listApprovedValues(ind0.id);
      const finalTarget = ind.targets[ind.targets.length - 1];
      const isNumeric = !ind.isTextIndicator && !ind.isYesNoIndicator;

      // Valor actual do indicador = SOMA de todos os valores aprovados
      // (cada submissão é um incremento), não só o mais recente. Para
      // indicadores de texto/Sim-Não, que não se somam, usa-se o
      // aprovado mais recente.
      let currentValue = null;
      if (isNumeric) {
        if (approved.length) currentValue = approved.reduce((sum, v) => sum + (Number(v.value) || 0), 0);
      } else if (approved.length) {
        approved.sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at));
        currentValue = approved[0].value;
      }

      let progressHtml = '<span class="small-note">—</span>';
      if (isNumeric && currentValue !== null && typeof finalTarget.value === 'number' && finalTarget.value > 0) {
        const pct = Math.min(100, Math.round((currentValue / finalTarget.value) * 100));
        progressHtml = `<div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%;"></div></div><span class="small-note">${pct}%</span>`;
      }
      const stage = ME.classifyStage(ind0, currentValue);
      const stageLabels = { atraso: '🔴 Em atraso', alcancada: '🟢 Meta alcançada', prazo: '🟡 Dentro do prazo' };
      const stageHtml = stage ? `<span class="stage-flag ${stage}">${stageLabels[stage]}</span>` : '<span class="small-note">—</span>';
      return `
        <tr data-id="${ind0.id}">
          <td><span class="level-tag">${ind.level}</span></td>
          <td>${escapeHtml(ind.name)}</td>
          <td class="small-note">${escapeHtml(String(ind.baseline))}</td>
          <td>${currentValue !== null ? escapeHtml(String(currentValue)) : `<span class="small-note">${'Sem valor aprovado'}</span>`}</td>
          <td class="small-note">${escapeHtml(String(finalTarget.value))}</td>
          <td>${progressHtml}</td>
          <td>${stageHtml}</td>
          <td class="reorder-td" style="display:none; white-space:nowrap;" onclick="event.stopPropagation()">
            <button type="button" class="btn btn-secondary btn-sm reorder-btn" data-id="${ind0.id}" data-dir="up" title="Mover para cima">↑</button>
            <button type="button" class="btn btn-secondary btn-sm reorder-btn" data-id="${ind0.id}" data-dir="down" title="Mover para baixo">↓</button>
          </td>
        </tr>
      `;
    }));

    if (!rowsHtml.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="small-note" style="padding:24px;">${'Nenhum indicador encontrado com estes filtros.'}</td></tr>`;
      return;
    }
    tbody.innerHTML = rowsHtml.join('');
    document.getElementById('reorder-th').style.display = currentAdmin.role === 'admin' ? '' : 'none';
    tbody.querySelectorAll('.reorder-td').forEach(td => { td.style.display = currentAdmin.role === 'admin' ? '' : 'none'; });
    tbody.querySelectorAll('.reorder-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          await ME.moveIndicator(btn.dataset.id, btn.dataset.dir);
          loadIndicators();
        } catch (err) {
          console.error(err);
          alert(err.message || 'Não foi possível reordenar.');
        }
      });
    });
    tbody.querySelectorAll('tr[data-id]').forEach(tr => {
      tr.addEventListener('click', () => { window.location.href = `indicador.html?id=${encodeURIComponent(tr.dataset.id)}`; });
    });
  } catch (err) {
    console.error(err);
    tbody.innerHTML = `<tr><td colspan="8"><div class="alert alert-error">${'Não foi possível carregar os indicadores.'}</div></td></tr>`;
  }
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-MZ', { day: '2-digit', month: 'short', year: 'numeric' });
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

document.getElementById('nav-toggle')?.addEventListener('click', () => {
  const nav = document.querySelector('.main-nav');
  const open = nav.classList.toggle('is-open');
  document.getElementById('nav-toggle').setAttribute('aria-expanded', String(open));
});
</script>
<script>
// Sino de notificações — só para o Administrador geral, actualizado em
// tempo real sempre que houver valores à espera de aprovação.
ME.onAuthChange(admin => {
  if (!admin || admin.role !== 'admin') return;
  const bell = document.getElementById('notif-bell');
  if (!bell) return;
  bell.style.display = '';
  ME.subscribePendingCount(count => {
    const badge = document.getElementById('notif-badge');
    if (count > 0) {
      badge.textContent = count > 99 ? '99+' : String(count);
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  });
});
</script>
</body>
</html>
