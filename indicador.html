<!DOCTYPE html>
<html lang="pt-MZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Indicador — M&amp;E MozCommunity</title>
<link rel="icon" href="img/logo-adin.jpg" type="image/jpeg">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
  .level-tag { font-size: 0.75rem; font-weight: 700; padding: 4px 11px; border-radius: 999px; background: var(--gold-tint); color: #8A5F13; }
  .stage-flag { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .stage-flag.atraso { background: #FCEAEA; color: #C81E2D; }
  .stage-flag.alcancada { background: #E6F4EA; color: #1F8A4C; }
  .stage-flag.prazo { background: #FFF6DC; color: #A8760C; }
  .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; margin: 20px 0 28px; }
  .meta-item dt { font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-muted); margin-bottom: 4px; }
  .meta-item dd { margin: 0; font-size: 0.92rem; }
  .info-block { margin-bottom: 22px; }
  .info-block h4 { font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-muted); margin-bottom: 6px; }
  .info-block p { margin: 0; }
  .targets-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 10px 0; }
  .targets-table th, .targets-table td { padding: 7px 10px; border-bottom: 1px solid var(--line); text-align: left; }
  .two-col { display: grid; grid-template-columns: 1.3fr 1fr; gap: 32px; align-items: start; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">
      <span class="brand-mark"><img src="img/logo-adin.jpg" alt="Logótipo ADIN"></span>
      <span class="brand-name">M&amp;E MozCommunity<small data-i18n="brand_tagline">Monitoria de Indicadores — ADIN</small></span>
    </a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menu" aria-expanded="false">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <nav class="main-nav">
      <a href="dashboard.html" data-i18n="nav_indicators">Indicadores</a>
      <a href="relatorios.html" data-i18n="nav_reports">Relatórios</a>
      <a href="approvals.html" id="approvals-link" style="display:none;" data-i18n="nav_approvals">Aprovações</a>
      <a href="users.html" id="users-link" style="display:none;" data-i18n="nav_users">Utilizadores</a>
      <span class="small-note" id="admin-name-label" style="margin-right:8px;"></span>
            <a href="approvals.html" id="notif-bell" title="Aprovações pendentes" style="display:none; position:relative; text-decoration:none; color:var(--ink); margin-right:6px; font-size:1.1rem;">
        🔔<span id="notif-badge" style="display:none; position:absolute; top:-6px; right:-10px; background:var(--brick); color:#fff; font-size:0.62rem; font-weight:700; padding:1px 5px; border-radius:999px; line-height:1.3;">0</span>
      </a>
      <a href="#" id="logout-link" data-i18n="nav_logout">Sair</a>
    </nav>
  </div>
</header>

<main>
  <section>
    <div class="container" id="content" style="max-width:1080px;">
      <div class="skeleton" style="height:300px;"></div>
    </div>
  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/store.js"></script>
<script src="js/i18n.js"></script>
<script>
let currentAdmin = null;
let resultsChart = null;
const indicatorId = new URLSearchParams(window.location.search).get('id');
const contentEl = document.getElementById('content');

I18N.applyStaticTranslations();
I18N.injectToggle('.main-nav');

ME.onAuthChange(admin => {
  if (!admin) { window.location.href = 'index.html'; return; }
  if (admin.noProfile) {
    alert('A tua conta não tem permissões configuradas nesta plataforma.');
    ME.adminLogout().then(() => window.location.href = 'index.html');
    return;
  }
  currentAdmin = admin;
  const roleLabels = { admin: I18N.t('role_admin'), submitter: I18N.t('role_submitter'), readonly: I18N.t('role_readonly') };
  document.getElementById('admin-name-label').textContent = `${admin.name} · ${roleLabels[admin.role] || admin.role}`;
  document.getElementById('approvals-link').style.display = admin.role === 'admin' ? '' : 'none';
  document.getElementById('users-link').style.display = admin.role === 'admin' ? '' : 'none';

  if (!indicatorId) {
    contentEl.innerHTML = '<div class="alert alert-error">Indicador não especificado.</div>';
    return;
  }
  loadIndicator();
});

document.getElementById('logout-link').addEventListener('click', (e) => {
  e.preventDefault();
  ME.adminLogout().then(() => window.location.href = 'index.html');
});

async function loadIndicator() {
  const ind = await ME.getIndicator(indicatorId);
  if (!ind) {
    contentEl.innerHTML = `<div class="alert alert-error">${I18N.getLang() === 'en' ? 'Indicator not found.' : 'Indicador não encontrado.'}</div>`;
    return;
  }
  try {
    const values = await ME.listValues({ indicator_id: indicatorId });
    render(ind, values);
  } catch (err) {
    console.error(err);
    contentEl.innerHTML = `<div class="alert alert-error">${I18N.getLang() === 'en' ? 'Could not load the indicator.' : 'Não foi possível carregar o indicador.'}</div>`;
  }
}

function render(ind0, values) {
  const ind = I18N.translateIndicator(ind0);
  const approved = values.filter(v => v.status === 'aprovado').sort((a, b) => ME.periodSortKey(a.period) - ME.periodSortKey(b.period));
  const isNumeric = !ind.isTextIndicator && !ind.isYesNoIndicator;
  const finalTarget = ind.targets[ind.targets.length - 1];

  // Valor actual do indicador = SOMA de todos os valores aprovados (cada
  // submissão é um incremento), não só o mais recente. Para indicadores
  // de texto/Sim-Não, que não se somam, usa-se o aprovado mais recente.
  const latest = approved[approved.length - 1] || null;
  const currentValue = isNumeric
    ? (approved.length ? approved.reduce((sum, v) => sum + (Number(v.value) || 0), 0) : null)
    : (latest ? latest.value : null);

  let pct = null;
  if (isNumeric && currentValue !== null && typeof finalTarget.value === 'number' && finalTarget.value > 0) {
    pct = Math.min(100, Math.round((currentValue / finalTarget.value) * 100));
  }
  const stage = ME.classifyStage(ind0, currentValue);
  const stageLabels = { atraso: I18N.t('stage_atraso'), alcancada: I18N.t('stage_alcancada'), prazo: I18N.t('stage_prazo') };


  const statusBadge = { submetido: 'badge-em_analise', aprovado: 'badge-resolvida', rejeitado: 'badge-encerrada' };
  const statusLabel = { submetido: I18N.t('status_submitted'), aprovado: I18N.t('status_approved'), rejeitado: I18N.t('status_rejected') };

  const historyHtml = values.length ? values.slice().sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at)).map(v => `
    <li>
      <span class="node"></span>
      <div class="tl-status">
        <span class="badge ${statusBadge[v.status]}">${statusLabel[v.status]}</span>
        ${escapeHtml(v.period)}: <strong>${escapeHtml(String(v.value))}</strong>
        ${v.disagg ? ' · ' + Object.entries(v.disagg).map(([k, val]) => `${k}: ${val}`).join(', ') : ''}
        ${v.status_disagg ? ' · ' + Object.entries(v.status_disagg).map(([k, val]) => `${k}: ${val}`).join(', ') : ''}
        ${(v.province || v.district) ? ` · <span class="small-note">${[v.province, v.district].filter(Boolean).join(', ')}</span>` : ''}
      </div>
      ${v.note ? `<div class="tl-note">${escapeHtml(v.note)}</div>` : ''}
      ${(v.evidence || []).map(e => `<div class="tl-note"><a href="${e.dataUrl}" download="${escapeHtml(e.name)}" class="btn btn-secondary btn-sm">📎 ${escapeHtml(e.name)}</a></div>`).join('')}
      <div class="tl-date">${I18N.t('submitted_by')} ${escapeHtml(v.submitted_by)} · ${formatDate(v.submitted_at)}</div>
      ${v.reviewed_by ? `<div class="tl-date">${I18N.t('reviewed_by')} ${escapeHtml(v.reviewed_by)} · ${formatDate(v.reviewed_at)}${v.review_note ? ' · ' + escapeHtml(v.review_note) : ''}</div>` : ''}
      ${(currentAdmin.role === 'admin' && v.status === 'submetido') ? `
        <div style="display:flex; gap:8px; margin-top:6px;">
          <button type="button" class="btn btn-primary btn-sm review-btn" data-id="${v.id}" data-approve="true">${I18N.t('approve')}</button>
          <button type="button" class="btn btn-secondary btn-sm review-btn" data-id="${v.id}" data-approve="false">${I18N.t('reject')}</button>
        </div>
      ` : ''}
    </li>
  `).join('') : `<li class="small-note">${I18N.t('no_submissions_yet')}</li>`;

  const canSubmit = currentAdmin && currentAdmin.role !== 'readonly';
  const periodFields = ME.getSubmissionPeriodFields(ind0);
  let periodFieldsHtml = '';
  if (periodFields.mode === 'year+sub') {
    periodFieldsHtml = `
      <div class="form-row">
        <div class="field"><label for="val-year">${I18N.t('year')}</label><select id="val-year">${periodFields.years.map(y => `<option value="${y}">${y}</option>`).join('')}</select></div>
        <div class="field"><label for="val-sub">${escapeHtml(periodFields.subLabel)}</label><select id="val-sub">${periodFields.subOptions.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('')}</select></div>
      </div>`;
  } else if (periodFields.mode === 'year-only') {
    periodFieldsHtml = `<div class="field"><label for="val-year">${periodFields.biennial ? (I18N.getLang() === 'en' ? 'Biennium start year' : 'Ano de início do biénio') : I18N.t('year')}</label><select id="val-year">${periodFields.years.map(y => `<option value="${y}">${y}${periodFields.biennial ? '–' + (y + 1) : ''}</option>`).join('')}</select></div>`;
  } else {
    periodFieldsHtml = `<div class="field"><label for="val-sub">${I18N.t('period')}</label><select id="val-sub">${periodFields.options.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}</select></div>`;
  }

  // A desagregação (género e estatuto de beneficiário) só faz sentido em
  // indicadores que contam PESSOAS — o próprio Quadro de Resultados só
  // define desagregação (Mulheres/Jovens) para esses. Um indicador de
  // localidades, infra-estruturas, comités, etc. não deve ter estes campos.
  const isAboutPeople = (ind0.disaggregation || []).length > 0;

  // Nota: o data-key mantém-se sempre em português (é a chave gravada no
  // Firestore, usada pelos relatórios) — só o texto mostrado ao
  // utilizador é traduzido.
  const DISAGG_LABEL_EN = { 'Mulheres': 'Women', 'Jovens': 'Youth', 'Mulheres (%)': 'Women (%)' };
  const translateDisaggLabel = (d) => (I18N.getLang() === 'en' && DISAGG_LABEL_EN[d]) ? DISAGG_LABEL_EN[d] : d;

  const disaggFieldsHtml = (ind0.disaggregation || []).map(d => `
    <div class="field"><label>${escapeHtml(translateDisaggLabel(d))} <span class="required">*</span></label><input type="number" class="disagg-input" data-key="${escapeHtml(d)}" required></div>
  `).join('');

  const STATUS_LABEL_EN = { 'Deslocados': 'Displaced', 'Retornados': 'Returnees', 'Anfitriões': 'Host communities' };
  const translateStatusLabel = (s) => (I18N.getLang() === 'en' && STATUS_LABEL_EN[s]) ? STATUS_LABEL_EN[s] : s;

  const statusFieldsHtml = isAboutPeople ? ME.getBeneficiaryStatuses().map(s => `
    <div class="field"><label>${escapeHtml(translateStatusLabel(s))} <span class="required">*</span></label><input type="number" class="status-input" data-key="${escapeHtml(s)}" required></div>
  `).join('') : '';

  const submitFormHtml = canSubmit ? `
    <div class="form-card" style="padding:18px;">
      <p class="small-note" style="margin:0 0 12px;">${I18N.t('frequency_label')}: <strong>${escapeHtml(ind.frequency)}</strong></p>
      ${periodFieldsHtml}
      <div class="field">
        <label for="val-value">${I18N.t('value_label')} ${ind.isYesNoIndicator ? '(Sim/Não)' : ind.isTextIndicator ? '(descrição)' : `(${ind.unit})`} <span class="required">*</span></label>
        ${ind.isYesNoIndicator
          ? `<select id="val-value" required><option value="Sim">Sim</option><option value="Não">Não</option></select>`
          : ind.isTextIndicator
            ? `<textarea id="val-value" placeholder="Descreva o estado actual" required></textarea>`
            : `<input type="number" id="val-value" placeholder="Ex: 25" required>`
        }
      </div>
      <div class="form-row">
        <div class="field">
          <label for="val-province">${I18N.t('province_label')} <span class="required">*</span></label>
          <select id="val-province" required><option value="">${I18N.t('select_placeholder')}</option>${ME.getProvinces().map(p => `<option value="${p}">${p}</option>`).join('')}</select>
        </div>
        <div class="field">
          <label for="val-district">${I18N.t('district_label')} <span class="required">*</span></label>
          <select id="val-district" disabled required><option value="">${I18N.t('select_province_first')}</option></select>
        </div>
      </div>
      ${disaggFieldsHtml}
      ${isAboutPeople ? `<p class="small-note" style="margin:14px 0 6px;">${I18N.t('beneficiary_status_disagg')}</p>${statusFieldsHtml}` : ''}
      <div class="field"><label for="val-note">${I18N.t('process_summary_label')} <span class="required">*</span></label><textarea id="val-note" placeholder="${I18N.t('process_summary_placeholder')}" required></textarea></div>
      <div class="field">
        <label for="val-evidence">${I18N.t('attach_evidence')} <span class="required">*</span></label>
        <input type="file" id="val-evidence" accept=".jpg,.jpeg,.png,.webp,.pdf" style="padding:8px;" required>
        <div class="hint">${I18N.getLang() === 'en' ? 'Up to 200KB, 2 files.' : 'Até 200KB, 2 ficheiros.'}</div>
      </div>
      <button type="button" class="btn btn-primary btn-block" id="submit-value-btn">${I18N.t('submit_for_approval')}</button>
    </div>
  ` : '';

  contentEl.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
      <a href="dashboard.html" class="small-note" style="text-decoration:none;">${I18N.t('back_to_indicators')}</a>
      ${currentAdmin.role === 'admin' ? `<a href="indicator-edit.html?id=${encodeURIComponent(ind.id)}" class="btn btn-secondary btn-sm">${I18N.t('edit_indicator')}</a>` : ''}
    </div>
    <div style="margin-top:14px;">
      <span class="level-tag">${ind.level}</span>
      ${ind.component ? `<span class="small-note" style="margin-left:8px;">${escapeHtml(ind.component)}</span>` : ''}
    </div>
    <h1 style="font-size:clamp(1.5rem,2.6vw,2rem); margin:10px 0 0;">${escapeHtml(ind.name)}</h1>

    <div class="meta-grid">
      <div class="meta-item"><dt>${I18N.t('unit_label')}</dt><dd>${escapeHtml(ind.unit)}</dd></div>
      <div class="meta-item"><dt>${I18N.t('frequency_label')}</dt><dd>${escapeHtml(ind.frequency)}</dd></div>
      <div class="meta-item"><dt>${I18N.t('verification_means')}</dt><dd>${escapeHtml(ind.dataSource || '—')}</dd></div>
      <div class="meta-item"><dt>${I18N.t('responsible_label')}</dt><dd>${escapeHtml(ind.responsible)}</dd></div>
      <div class="meta-item"><dt>${I18N.t('baseline_full')}</dt><dd>${escapeHtml(String(ind.baseline))}</dd></div>
      <div class="meta-item"><dt>${I18N.t('col_final_target')}</dt><dd>${escapeHtml(String(finalTarget.value))}</dd></div>
      <div class="meta-item"><dt>${I18N.t('current_value_sum')}</dt><dd>${currentValue !== null ? escapeHtml(String(currentValue)) : '—'}</dd></div>
      <div class="meta-item"><dt>${I18N.t('col_progress')}</dt><dd>${pct !== null ? pct + '%' : '—'}</dd></div>
      <div class="meta-item"><dt>${I18N.t('col_stage')}</dt><dd>${stage ? `<span class="stage-flag ${stage}">${stageLabels[stage]}</span>` : '—'}</dd></div>
    </div>

    <div class="info-block">
      <h4>${I18N.t('description_label')}</h4>
      <p>${escapeHtml(ind.description || (I18N.getLang() === 'en' ? 'No description available.' : 'Sem descrição disponível.'))}</p>
    </div>
    <div class="info-block">
      <h4>${I18N.t('methodology_label')}</h4>
      <p>${escapeHtml(ind.methodology || (I18N.getLang() === 'en' ? 'No methodology available.' : 'Sem metodologia disponível.'))}</p>
    </div>

    <div class="two-col" style="margin-top:28px;">
      <div>
        <h3 style="font-size:1.1rem;">${I18N.t('results_chart')}</h3>
        <div class="chart-card" style="margin-top:10px;">
          ${isNumeric
            ? '<canvas id="results-chart" height="220"></canvas>'
            : `<p class="small-note">${I18N.getLang() === 'en' ? `This indicator is of type ${ind.isYesNoIndicator ? 'Yes/No' : 'text'} — it is not shown as a chart. See the targets table and history below.` : `Este indicador é de tipo ${ind.isYesNoIndicator ? 'Sim/Não' : 'texto'} — não é apresentado em gráfico. Consulta a tabela de metas e o histórico abaixo.`}</p>`
          }
        </div>

        <h3 style="font-size:1.1rem; margin-top:28px;">${I18N.t('targets_and_values')}</h3>
        <div style="overflow-x:auto;">${buildYearPeriodTable(ind0, approved)}</div>

        <h3 style="font-size:1.1rem; margin-top:28px;">${I18N.t('submission_history')}</h3>
        <ul class="thread-timeline">${historyHtml}</ul>
      </div>

      <div>
        <h3 style="font-size:1.1rem;">${I18N.t('submit_new_value')}</h3>
        <div id="submit-alert"></div>
        ${submitFormHtml || `<p class="small-note">${I18N.t('readonly_note')}</p>`}
      </div>
    </div>
  `;

  if (isNumeric) renderChart(ind, approved);
  wireEvents(ind0);
}

// Constrói a tabela-matriz: Ano em linhas, sub-períodos (Trimestre/
// Semestre, conforme a periodicidade) em colunas, seguido de Total e
// Observações. Mostra o valor mais recente submetido em cada célula,
// com uma indicação do estado (aprovado / submetido / rejeitado).
function buildYearPeriodTable(ind, values) {
  const periodFields = ME.getSubmissionPeriodFields(ind);
  const statusTag = { aprovado: '', submetido: ' <span class="small-note">(submetido)</span>', rejeitado: ' <span class="small-note">(rejeitado)</span>' };

  // Agrupa a submissão mais recente por período exacto.
  const latestByPeriod = {};
  values.forEach(v => {
    const existing = latestByPeriod[v.period];
    if (!existing || new Date(v.submitted_at) > new Date(existing.submitted_at)) {
      latestByPeriod[v.period] = v;
    }
  });

  let columns; // lista de sub-períodos (colunas), ou ['Valor'] se não houver sub-divisão
  let rowsAreYears = true;
  if (periodFields.mode === 'year+sub') {
    columns = periodFields.subOptions;
  } else if (periodFields.mode === 'year-only') {
    columns = ['Valor'];
  } else {
    // Modo "fixed" (por marcos): não há ano/período regular — cada linha
    // é o próprio período definido nas metas, e a meta casa exactamente
    // com o período (ex: "Mai/2027"), sem precisar de passar pelo ano.
    columns = ['Valor'];
    rowsAreYears = false;
  }

  // Metas: no modo "fixed", casam pelo período exacto. Nos modos
  // "year+sub" e "year-only", as metas do Quadro de Resultados usam
  // rótulos de mês/ano (ex: "Mai/2027", "Jun/2031") que NUNCA coincidem
  // caracter-a-caracter com os períodos de submissão (ex: "T1 2027") —
  // por isso casam-se pelo ANO, numa coluna própria "Meta do ano", em vez
  // de tentar encaixar a meta numa célula de trimestre/semestre que o
  // Quadro de Resultados não especifica.
  const targetByPeriod = {};
  const targetByYear = {};
  ind.targets.forEach(t => {
    targetByPeriod[t.period] = t.value;
    const y = periodSortKeyToYear(t.period);
    if (y) targetByYear[y] = t.value;
  });

  // Só mostra os anos que têm meta definida ou algum valor submetido —
  // para a tabela corresponder exactamente às metas do Quadro de
  // Resultados, sem linhas vazias sem meta nem dados.
  const rowKeys = new Set();
  if (rowsAreYears) {
    Object.keys(targetByYear).forEach(y => rowKeys.add(Number(y)));
    Object.keys(latestByPeriod).forEach(p => {
      const y = periodSortKeyToYear(p);
      if (y) rowKeys.add(y);
    });
  } else {
    ind.targets.forEach(t => rowKeys.add(t.period));
    Object.keys(latestByPeriod).forEach(p => rowKeys.add(p));
  }
  const sortedRowKeys = Array.from(rowKeys).sort((a, b) => rowsAreYears ? (a - b) : (ME.periodSortKey(a) - ME.periodSortKey(b)));

  if (!sortedRowKeys.length) {
    return '<p class="small-note">Ainda sem metas nem dados para apresentar.</p>';
  }

  const theadCols = rowsAreYears
    ? `<th>${I18N.t('year')}</th><th>${I18N.t('target_of_year')}</th>${columns.map(c => `<th>${escapeHtml(c)}</th>`).join('')}<th>${I18N.t('total_achieved')}</th><th>${I18N.t('notes')}</th>`
    : `<th>${I18N.t('period')}</th><th>${I18N.t('target')}</th><th>${I18N.t('achieved')}</th>`;

  const bodyRows = sortedRowKeys.map(rowKey => {
    if (!rowsAreYears) {
      const target = targetByPeriod[rowKey];
      const v = latestByPeriod[rowKey];
      return `<tr>
        <td>${escapeHtml(rowKey)}</td>
        <td>${target !== undefined ? escapeHtml(String(target)) : '<span class="small-note">—</span>'}</td>
        <td>${v ? escapeHtml(String(v.value)) + (statusTag[v.status] || '') : '<span class="small-note">—</span>'}</td>
      </tr>`;
    }

    const yearTarget = targetByYear[rowKey];
    let total = 0;
    let hasNumericTotal = false;
    const notes = [];
    const cellsHtml = columns.map(col => {
      const period = periodFields.mode === 'year-only'
        ? ME.combinePeriod(periodFields, rowKey, null)
        : ME.combinePeriod(periodFields, rowKey, col);
      const v = latestByPeriod[period];

      if (v && v.status === 'aprovado' && typeof v.value !== 'undefined' && !isNaN(Number(v.value))) {
        total += Number(v.value);
        hasNumericTotal = true;
      }
      if (v && v.note) notes.push(`${col === 'Valor' ? rowKey : col}: ${v.note}`);

      return v ? `<td>${escapeHtml(String(v.value))}${statusTag[v.status] || ''}</td>` : '<td><span class="small-note">—</span></td>';
    }).join('');

    return `<tr>
      <td>${rowKey}</td>
      <td class="small-note">${yearTarget !== undefined ? escapeHtml(String(yearTarget)) : '—'}</td>
      ${cellsHtml}
      <td>${hasNumericTotal ? escapeHtml(String(total)) : '<span class="small-note">—</span>'}</td>
      <td class="small-note">${notes.length ? escapeHtml(notes.join('; ')) : '—'}</td>
    </tr>`;
  }).join('');

  return `<table class="targets-table"><thead><tr>${theadCols}</tr></thead><tbody>${bodyRows}</tbody></table>`;
}

// Extrai o ano de um rótulo de período (para agrupar submissões em modo
// "fixed" ou para casar com o ano correcto na tabela).
function periodSortKeyToYear(period) {
  let m;
  if ((m = period.match(/\/(\d{4})$/))) return Number(m[1]);
  if ((m = period.match(/ (\d{4})$/))) return Number(m[1]);
  if ((m = period.match(/^(\d{4})/))) return Number(m[1]);
  return null;
}

function renderChart(ind, approved) {
  const allPeriods = Array.from(new Set([...ind.targets.map(t => t.period), ...approved.map(a => a.period)]))
    .sort((a, b) => ME.periodSortKey(a) - ME.periodSortKey(b));

  const targetMap = Object.fromEntries(ind.targets.map(t => [t.period, t.value]));
  const actualMap = Object.fromEntries(approved.map(a => [a.period, Number(a.value)]));

  const ctx = document.getElementById('results-chart');
  if (!ctx) return;
  resultsChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: allPeriods,
      datasets: [
        { label: I18N.t('target'), data: allPeriods.map(p => targetMap[p] ?? null), borderColor: '#D9773A', backgroundColor: 'rgba(217,119,58,0.1)', borderDash: [5, 4], spanGaps: true, tension: 0.2 },
        { label: I18N.getLang() === 'en' ? 'Achieved (approved)' : 'Realizado (aprovado)', data: allPeriods.map(p => actualMap[p] ?? null), borderColor: '#9D212B', backgroundColor: 'rgba(157,33,43,0.12)', fill: true, spanGaps: true, tension: 0.2 },
      ],
    },
    options: {
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { family: 'Public Sans' } } } },
      scales: { y: { beginAtZero: true } },
    },
  });
}

function wireEvents(ind) {
  const en = I18N.getLang() === 'en';
  document.querySelectorAll('.review-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const approve = btn.dataset.approve === 'true';
      const note = approve ? null : (prompt(en ? 'Reason for rejection (optional):' : 'Motivo da rejeição (opcional):') || null);
      try {
        await ME.reviewValue(btn.dataset.id, { approve, review_note: note });
        loadIndicator();
      } catch (err) {
        console.error(err);
        alert(err.message || (en ? 'Could not update.' : 'Não foi possível actualizar.'));
      }
    });
  });

  const provinceEl = document.getElementById('val-province');
  const districtEl = document.getElementById('val-district');
  if (provinceEl && districtEl) {
    provinceEl.addEventListener('change', () => {
      if (!provinceEl.value) {
        districtEl.innerHTML = `<option value="">${I18N.t('select_province_first')}</option>`;
        districtEl.disabled = true;
        return;
      }
      districtEl.innerHTML = '<option value="">—</option>' + ME.getDistricts(provinceEl.value).map(d => `<option value="${d}">${d}</option>`).join('');
      districtEl.disabled = false;
    });
  }

  const submitBtn = document.getElementById('submit-value-btn');
  if (submitBtn) {
    submitBtn.addEventListener('click', async () => {
      const alertEl = document.getElementById('submit-alert');
      alertEl.innerHTML = '';

      const missing = [];

      const valueEl = document.getElementById('val-value');
      if (!valueEl.value || !String(valueEl.value).trim()) missing.push(I18N.t('value_label'));

      if (provinceEl && !provinceEl.value) missing.push(I18N.t('province_label'));
      if (districtEl && !districtEl.value) missing.push(I18N.t('district_label'));

      const disaggInputs = document.querySelectorAll('.disagg-input');
      disaggInputs.forEach(inp => { if (inp.value === '') missing.push(inp.dataset.key); });

      const statusInputs = document.querySelectorAll('.status-input');
      statusInputs.forEach(inp => { if (inp.value === '') missing.push(inp.dataset.key); });

      const noteValue = document.getElementById('val-note').value.trim();
      if (!noteValue) missing.push(I18N.t('process_summary_label'));

      const fileList = document.getElementById('val-evidence').files;
      if (!fileList || !fileList.length) missing.push(I18N.t('attach_evidence'));

      if (missing.length) {
        const msg = en ? `All fields are required. Still missing: ${missing.map(escapeHtml).join(', ')}.` : `Todos os campos são obrigatórios. Falta preencher: ${missing.map(escapeHtml).join(', ')}.`;
        alertEl.innerHTML = `<div class="alert alert-error">${msg}</div>`;
        return;
      }

      const disagg = {};
      disaggInputs.forEach(inp => { disagg[inp.dataset.key] = Number(inp.value); });
      const statusDisagg = {};
      statusInputs.forEach(inp => { statusDisagg[inp.dataset.key] = Number(inp.value); });
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>';
      try {
        const periodFields = ME.getSubmissionPeriodFields(ind);
        const yearEl = document.getElementById('val-year');
        const subEl = document.getElementById('val-sub');
        const period = ME.combinePeriod(periodFields, yearEl ? Number(yearEl.value) : null, subEl ? subEl.value : null);
        const result = await ME.submitValue({
          indicator_id: ind.id,
          period,
          value: valueEl.value,
          disagg: Object.keys(disagg).length ? disagg : null,
          status_disagg: Object.keys(statusDisagg).length ? statusDisagg : null,
          province: provinceEl ? provinceEl.value : null,
          district: districtEl ? districtEl.value : null,
          note: noteValue,
        }, fileList);
        if (result.skipped && result.skipped.length) {
          alert(en ? `The file "${result.skipped.join(', ')}" was not attached because it exceeds 200KB.` : `O ficheiro "${result.skipped.join(', ')}" não foi anexado por exceder 200KB.`);
        }
        loadIndicator();
      } catch (err) {
        console.error(err);
        alertEl.innerHTML = `<div class="alert alert-error">${err.message || (en ? 'Could not submit.' : 'Não foi possível submeter.')}</div>`;
        submitBtn.disabled = false;
        submitBtn.textContent = I18N.t('submit_for_approval');
      }
    });
  }
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-MZ', { day: '2-digit', month: 'short', year: 'numeric' });
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

document.getElementById('nav-toggle')?.addEventListener('click', () => {
  const nav = document.querySelector('.main-nav');
  const open = nav.classList.toggle('is-open');
  document.getElementById('nav-toggle').setAttribute('aria-expanded', String(open));
});
</script>
<script>
// Sino de notificações — só para o Administrador geral, actualizado em
// tempo real sempre que houver valores à espera de aprovação.
ME.onAuthChange(admin => {
  if (!admin || admin.role !== 'admin') return;
  const bell = document.getElementById('notif-bell');
  if (!bell) return;
  bell.style.display = '';
  ME.subscribePendingCount(count => {
    const badge = document.getElementById('notif-badge');
    if (count > 0) {
      badge.textContent = count > 99 ? '99+' : String(count);
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  });
});
</script>
