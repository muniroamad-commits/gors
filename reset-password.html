<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redefinir palavra-passe — MozCommunity</title>
<meta name="description" content="Defina uma nova palavra-passe para aceder à plataforma.">
<link rel="icon" href="img/adin-logo.png" type="image/png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="center-page">
  <div class="auth-box">
    <div class="card">
      <div class="card-header">
        <p class="card-title">Definir nova palavra-passe</p>
        <p class="text-sm muted mt-1" id="reset-desc">A validar o link de recuperação…</p>
      </div>
      <div class="card-content">
        <form id="reset-form">
          <div class="field">
            <label for="new-pass">Nova palavra-passe</label>
            <input class="input" id="new-pass" type="password" required minlength="6" disabled>
          </div>
          <div class="field">
            <label for="confirm-pass">Confirmar palavra-passe</label>
            <input class="input" id="confirm-pass" type="password" required minlength="6" disabled>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="reset-btn" disabled>Atualizar palavra-passe</button>
        </form>
        <p class="text-sm mt-4" style="text-align:center;">
          <a href="auth.html" class="muted">← Voltar ao início de sessão</a>
        </p>
      </div>
    </div>
  </div>
</div>

<div id="toast-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/lib.js"></script>
<script src="js/ui.js"></script>
<script src="js/data.js"></script>
<script>
(function () {
  const sb = window.GORS.sb;
  let ready = false;

  function markReady() {
    if (ready) return;
    ready = true;
    document.getElementById("reset-desc").textContent = "Escolha uma nova palavra-passe para a sua conta.";
    document.getElementById("new-pass").disabled = false;
    document.getElementById("confirm-pass").disabled = false;
    document.getElementById("reset-btn").disabled = false;
  }

  // Supabase parses the recovery hash automatically on load and fires
  // PASSWORD_RECOVERY / SIGNED_IN. We just need a session to update the user.
  sb.auth.onAuthStateChange((_event, session) => {
    if (session) markReady();
  });
  sb.auth.getSession().then(({ data }) => {
    if (data.session) markReady();
  });

  document.getElementById("reset-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const password = document.getElementById("new-pass").value;
    const confirm = document.getElementById("confirm-pass").value;
    if (password.length < 6) {
      window.GORS.toast("A palavra-passe deve ter pelo menos 6 caracteres.", "error");
      return;
    }
    if (password !== confirm) {
      window.GORS.toast("As palavras-passe não coincidem.", "error");
      return;
    }
    const btn = document.getElementById("reset-btn");
    window.GORS.setBusy(btn, true, "A actualizar…");
    const { error } = await sb.auth.updateUser({ password });
    window.GORS.setBusy(btn, false);
    if (error) {
      window.GORS.toastError(error);
      return;
    }
    window.GORS.toast("Palavra-passe atualizada. Já pode aceder.", "success");
    window.location.href = "dashboard.html";
  });
})();
</script>
</body>
</html>
