<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Componente — GORS</title>
<link rel="icon" href="img/adin-logo.png" type="image/png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <div class="app-main">
    <header class="app-topbar" id="app-topbar"></header>
    <main class="app-content">
      <div id="comp-loading" class="loading-block"><span class="spinner"></span> A carregar…</div>
      <div id="comp-content" class="stack hidden"></div>
    </main>
  </div>
</div>

<div id="toast-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/lib.js"></script>
<script src="js/ui.js"></script>
<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script>
(async function () {
  const G = window.GORS;
  const user = await G.requireAuth();
  if (!user) return;

  let fw;
  try {
    fw = await G.getFramework();
  } catch (err) {
    document.getElementById("comp-loading").innerHTML = `<p class="muted">${G.escapeHtml(err.message)}</p>`;
    return;
  }
  G.renderShell(fw, "dashboard");

  const id = G.qs("id");
  const component = fw.components.find((c) => c.id === id);
  if (!component) {
    document.getElementById("comp-loading").innerHTML = `<p class="muted">Componente não encontrado.</p>`;
    return;
  }

  const inds = fw.indicators.filter((i) => i.component_id === id && i.parent_id === null);
  const tracked = inds.filter((i) => G.progressRatio(i) !== null);
  const avg = tracked.length > 0 ? Math.round((tracked.reduce((s, i) => s + (G.progressRatio(i) || 0), 0) / tracked.length) * 100) : 0;

  document.getElementById("comp-content").innerHTML = `
    <a href="dashboard.html" class="text-sm muted">← Painel</a>
    <div>
      <span class="badge" style="background:color-mix(in oklch, var(--primary) 12%, transparent);color:var(--primary);">Componente ${G.escapeHtml(component.code)}</span>
      <h1 class="text-2xl mt-2">${G.escapeHtml(component.title)}</h1>
      ${component.description ? `<p class="text-sm muted mt-1" style="max-width:42rem;">${G.escapeHtml(component.description)}</p>` : ""}
    </div>

    <div class="card">
      <div class="card-content flex-between">
        <div>
          <p class="text-sm muted">Progresso do componente</p>
          <p class="text-2xl font-semibold mt-1">${avg}%</p>
        </div>
        <div style="width:50%;min-width:12rem;">
          <div class="progress"><span style="width:${Math.min(100, avg)}%;"></span></div>
          <p class="text-xs muted mt-2" style="text-align:right;">${inds.length} indicadores</p>
        </div>
      </div>
    </div>

    <div class="card"><div class="card-content-flush divide">
      ${inds
        .map((ind) => {
          const last = G.latestActual(ind);
          const p = G.progressRatio(ind);
          const status = G.indicatorStatus(ind);
          const real = last ? (ind.value_type === "text" ? "Registado" : G.formatValue(G.cumulativeValue(ind), ind.value_type)) : "—";
          const meta = ind.value_type === "text" ? "—" : G.formatValue(ind.final_target, ind.value_type);
          return `
          <a href="indicator.html?id=${ind.id}" style="display:block;padding:1rem;">
            <div class="flex-between" style="align-items:flex-start;">
              <p class="text-sm font-medium">${G.escapeHtml(ind.name)}</p>
              <span class="badge ${G.STATUS_META[status].cls}">${G.STATUS_META[status].label}</span>
            </div>
            <div class="progress mt-2"><span style="width:${p !== null ? Math.min(100, p * 100) : 0}%;"></span></div>
            <div class="flex-between mt-2 text-xs muted">
              <span>Real acumulado: ${G.escapeHtml(real)}</span>
              <span>Meta: ${G.escapeHtml(meta)}</span>
            </div>
          </a>`;
        })
        .join("")}
    </div></div>
  `;

  document.getElementById("comp-loading").classList.add("hidden");
  document.getElementById("comp-content").classList.remove("hidden");
})();
</script>
</body>
</html>
