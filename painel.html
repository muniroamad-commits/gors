<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel público — MozCommunity</title>
<meta name="description" content="Painel público de monitoria de todos os indicadores do projecto MozCommunity — metas, valores reais e progresso por componente.">
<link rel="icon" href="img/adin-logo.png" type="image/png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container flex-between">
    <a href="index.html" class="brand">
      <span class="brand-mark"><img src="img/adin-logo.png" alt="ADIN"></span>
      <span class="brand-name text-sm">MozCommunity — Painel</span>
    </a>
    <a href="auth.html" class="btn btn-outline btn-sm">Entrar</a>
  </div>
</header>

<main class="container-lg stack" style="padding-top:1.5rem;padding-bottom:3rem;">
  <div>
    <h1 class="text-2xl">Monitoria de indicadores do projecto MozCommunity</h1>
    <p class="text-sm muted mt-1" id="painel-subtitle">A carregar…</p>
  </div>

  <div id="painel-loading" class="loading-block"><span class="spinner"></span> A carregar dados…</div>

  <div id="painel-content" class="stack hidden">
    <div class="grid grid-4" id="painel-kpis"></div>

    <div class="card">
      <div class="card-header"><p class="card-title">Progresso por componente</p></div>
      <div class="card-content" id="painel-component-progress"></div>
    </div>

    <div class="flex gap-3 flex-wrap">
      <input class="input" id="painel-search" placeholder="Pesquisar indicador…" style="flex:1;min-width:200px;">
      <select class="input" id="painel-filter" style="max-width:16rem;">
        <option value="all">Todos os níveis</option>
        <option value="pdo">Apenas PDO</option>
        <option value="intermediate">Apenas intermediários</option>
      </select>
    </div>

    <div class="stack" id="painel-groups"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/lib.js"></script>
<script src="js/ui.js"></script>
<script src="js/data.js"></script>
<script>
(async function () {
  const G = window.GORS;
  let framework = null;

  function componentSelect(components) {
    const sel = document.getElementById("painel-filter");
    for (const c of components) {
      const opt = document.createElement("option");
      opt.value = `comp:${c.id}`;
      opt.textContent = `${c.code} · ${c.title}`;
      sel.appendChild(opt);
    }
  }

  function kpiCard(label, value, hint) {
    return `<div class="card"><div class="card-content">
      <p class="text-sm muted">${label}</p>
      <p class="text-2xl font-semibold mt-1">${value}</p>
      ${hint ? `<p class="text-xs muted mt-1">${hint}</p>` : ""}
    </div></div>`;
  }

  function render() {
    const { indicators, components } = framework;
    const q = document.getElementById("painel-search").value.toLowerCase();
    const filter = document.getElementById("painel-filter").value;

    const statusCounts = { on_track: 0, at_risk: 0, off_track: 0, no_data: 0 };
    for (const ind of indicators) statusCounts[G.indicatorStatus(ind)]++;

    const tracked = indicators.filter((i) => G.progressRatio(i) !== null);
    const avgProgress =
      tracked.length > 0
        ? Math.round((tracked.reduce((s, i) => s + (G.progressRatio(i) || 0), 0) / tracked.length) * 100)
        : 0;

    document.getElementById("painel-subtitle").textContent =
      `Acesso público · ${indicators.length} indicadores · ${components.length} componentes`;

    document.getElementById("painel-kpis").innerHTML =
      kpiCard("Progresso médio", `${avgProgress}%`, `${tracked.length} indicadores com dados`) +
      kpiCard("No alvo", `${statusCounts.on_track}`, `de ${indicators.length}`) +
      kpiCard("Em risco / atrasados", `${statusCounts.at_risk + statusCounts.off_track}`, `${statusCounts.off_track} atrasados`) +
      kpiCard("Sem dados", `${statusCounts.no_data}`, "Aguardam registo");

    const compProgress = components.map((c) => {
      const inds = indicators.filter((i) => i.component_id === c.id);
      const t = inds.filter((i) => G.progressRatio(i) !== null);
      const p = t.length > 0 ? Math.round((t.reduce((s, i) => s + (G.progressRatio(i) || 0), 0) / t.length) * 100) : 0;
      return { code: c.code, title: c.title, progress: p };
    });
    document.getElementById("painel-component-progress").innerHTML = compProgress
      .map(
        (c) => `
      <div class="mt-2" style="margin-bottom:0.9rem;">
        <div class="flex-between text-sm"><span class="font-medium">${G.escapeHtml(c.code)} · ${G.escapeHtml(c.title)}</span><span class="muted">${c.progress}%</span></div>
        <div class="progress mt-1"><span style="width:${Math.min(100, c.progress)}%;background:${c.progress >= 70 ? "var(--success)" : c.progress >= 40 ? "var(--warning)" : "var(--chart-1)"}"></span></div>
      </div>`,
      )
      .join("");

    const filtered = indicators.filter((ind) => {
      if (q && !ind.name.toLowerCase().includes(q)) return false;
      if (filter === "pdo") return ind.level !== "intermediate";
      if (filter === "intermediate") return ind.level === "intermediate";
      if (filter.startsWith("comp:")) return ind.component_id === filter.slice(5);
      return true;
    });

    const componentName = (id) => (components.find((c) => c.id === id) || {}).code || "—";
    const groups = [
      { label: "PDO — Nível Programa", items: filtered.filter((i) => i.level === "pdo_program") },
      { label: "PDO — Fase I", items: filtered.filter((i) => i.level === "pdo_phase1") },
      ...components.map((c) => ({
        label: `${c.code} · ${c.title}`,
        items: filtered.filter((i) => i.level === "intermediate" && i.component_id === c.id),
      })),
    ].filter((g) => g.items.length > 0);

    document.getElementById("painel-groups").innerHTML = groups
      .map(
        (group) => `
      <div>
        <h2 class="text-sm font-semibold muted mb-2">${G.escapeHtml(group.label)}</h2>
        <div class="card"><div class="card-content-flush divide">
          ${group.items
            .map((ind) => {
              const last = G.latestActual(ind);
              const real = last
                ? ind.value_type === "text"
                  ? "Registado"
                  : G.formatValue(G.cumulativeValue(ind), ind.value_type)
                : "—";
              const meta = ind.value_type === "text" ? "—" : G.formatValue(ind.final_target, ind.value_type);
              const status = G.indicatorStatus(ind);
              return `
              <div class="row-link" style="flex-wrap:wrap;">
                <div style="min-width:0;flex:1;">
                  <p class="text-sm font-medium">${ind.parent_id ? "↳ " : ""}${G.escapeHtml(ind.name)}</p>
                  <p class="text-xs muted mt-1">${G.LEVEL_LABELS[ind.level]}${ind.level === "intermediate" ? ` · ${G.escapeHtml(componentName(ind.component_id))}` : ""} · ${G.escapeHtml(ind.unit)}</p>
                </div>
                <div class="flex gap-3" style="align-items:center;">
                  <div style="text-align:right;"><p class="text-xs muted">Real</p><p class="text-sm font-medium">${G.escapeHtml(real)}</p></div>
                  <div style="text-align:right;"><p class="text-xs muted">Meta</p><p class="text-sm font-medium">${G.escapeHtml(meta)}</p></div>
                  <span class="badge ${G.STATUS_META[status].cls}">${G.STATUS_META[status].label}</span>
                </div>
              </div>`;
            })
            .join("")}
        </div></div>
      </div>`,
      )
      .join("");
  }

  try {
    framework = await G.getPublicFramework();
    componentSelect(framework.components);
    document.getElementById("painel-loading").classList.add("hidden");
    document.getElementById("painel-content").classList.remove("hidden");
    render();
    document.getElementById("painel-search").addEventListener("input", render);
    document.getElementById("painel-filter").addEventListener("change", render);
  } catch (err) {
    document.getElementById("painel-loading").innerHTML =
      `<p class="muted">Não foi possível carregar os dados públicos: ${G.escapeHtml(err.message)}</p>`;
  }
})();
</script>
</body>
</html>
